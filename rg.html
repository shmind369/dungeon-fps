<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Wanderer's Dungeon</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { background:#0a0a0f; overflow:hidden; width:100%; height:100%; }
body { font-family:'Courier New',monospace; color:#c8b89a; user-select:none; -webkit-user-select:none; }

/* 画面表示は「固定仕様」：縦(高さ)を論理解像度で固定し、横幅はその時の実機アスペクト比から
   逆算する（widthScale.jsが起動時・リサイズ時にwidth/height/transform:scaleを計算して設定する）。
   これにより%やvw/vhに頼らず、常に同じ論理ピクセル座標系でレイアウトできる。
   position:fixedな子要素はtransformを持つ祖先を基準にするCSSの仕様を利用し、
   このラッパー自体を最上位の基準にしている。 */
#viewport-root {
  position:fixed; top:0; left:0;
  transform-origin:top left;
  display:flex; flex-direction:column;
  overflow:hidden;
  background:#0a0a0f;
}

/* 上エリア：プレイ画面 */
#game-area {
  position:relative;
  width:100%;
  flex:1 1 auto;
  min-height:0;
  overflow:hidden;
  background:#080810;
}

/* 下エリア：操作パネル */
#ctrl-area {
  flex-shrink:0;
  background:#1a1008;
  border-top:2px solid #4a3418;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 12px;
  gap:8px;
  height:300px;
}

#ui { position:absolute; top:0; left:0; right:0; pointer-events:none; z-index:10; }
#topbar {
  display:flex; flex-direction:column; gap:4px;
  background:rgba(10,8,4,0.82); border-bottom:1px solid #4a3418;
  padding:6px 10px; font-size:13px; color:#e8d4a0;
}
/* バー付きステータス(EXP/HP/満腹)は左端・中央・右端に固定で並べる */
#topbar-bars { display:flex; justify-content:space-between; align-items:center; width:100%; }
#topbar-stats { display:flex; flex-wrap:wrap; align-items:center; gap:4px 12px; }
.tb-item { display:flex; align-items:center; gap:3px; white-space:nowrap; }
.tb-label { color:#9a8458; font-size:11px; }
.stat-bar {
  display:inline-block; width:38px; height:7px;
  background:#000; border:1px solid #4a3418; border-radius:2px;
  margin-left:4px; overflow:hidden; vertical-align:middle;
}
.stat-bar-fill {
  display:block; height:100%; width:100%;
  transition:width 0.3s ease, background-color 0.3s ease;
}
#status { display:none; }
#action-label {
  position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
  min-width:240px; max-width:94%; box-sizing:border-box;
  background:#000;
  border:2px solid #f8f8f8;
  box-shadow:0 0 0 1px #000818, 0 4px 10px rgba(0,0,0,0.5);
  border-radius:2px;
  padding:9px 18px;
  font-size:14px; letter-spacing:1px; line-height:1.5;
  color:#fff; text-shadow:1px 1px 2px #000, -1px -1px 2px #000, 1px -1px 2px #000, -1px 1px 2px #000;
  text-align:center; white-space:pre-line;
  pointer-events:none; transition:opacity 0.45s ease; z-index:10;
  opacity:0;
}
#guide { display:none; }

/* ダッシュモード表示（右上・ステータスバー下、常時） */
#dash-indicator {
  position:absolute; top:0; right:8px;
  background:rgba(20,60,36,0.85); border:1px solid #40e080; border-radius:4px;
  color:#60ff90; font-size:11px; letter-spacing:1px;
  padding:4px 10px; z-index:11;
  display:none; pointer-events:none;
  text-shadow:0 0 4px rgba(96,255,144,0.5);
}
#dash-indicator.show { display:block; }

/* 階数表示（左上・ミニマップの少し上に配置） */
#floor-indicator {
  position:absolute; left:8px;
  background:rgba(20,20,24,0.6); border:1px solid #4a3a20; border-radius:4px;
  color:#f0d080; font-size:11px; font-weight:bold; letter-spacing:1px;
  padding:3px 8px; z-index:11; pointer-events:none;
}

/* ターン数表示（テスト用、右上・ステータスバー下） */
#turn-counter {
  position:absolute; right:8px;
  background:rgba(20,20,24,0.6); border:1px solid #4a3a20; border-radius:4px;
  color:#8a7a58; font-size:10px; letter-spacing:1px;
  padding:3px 8px; z-index:11; pointer-events:none;
}

/* 視点切り替えボタン（試験的な一人称モード。ステータスバー直下・中央） */
#camera-toggle {
  position:absolute; left:50%; transform:translateX(-50%);
  background:rgba(20,20,24,0.75); border:1px solid #4a3a20; border-radius:4px;
  color:#e8d4a0; font-size:11px; letter-spacing:1px;
  padding:4px 10px; z-index:11; pointer-events:auto; cursor:pointer;
}
#camera-toggle.active {
  background:rgba(20,60,80,0.85); border-color:#40b0e0; color:#80e0ff;
}

/* 8方向パッド */
#dpad {
  display:grid;
  grid-template-columns:repeat(3,62px);
  grid-template-rows:repeat(3,84px);
  gap:6px 3px;
  flex-shrink:0;
}
.dp {
  width:62px; height:84px; border-radius:10px;
  background:#2a1c0c; border:2px solid #6a5430;
  color:#f0d080; font-size:26px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  -webkit-tap-highlight-color:transparent;
  user-select:none; -webkit-user-select:none;
}
.dp:active { background:#5a3c1c; border-color:#f0d080; }
/* 各ボタンをグリッド上の固定位置に配置（一人称モードで↙↘を非表示にしても
   他のボタンが詰めて再配置されないようにするため） */
.dp[data-dir="7"] { grid-column:1; grid-row:1; }
.dp[data-dir="0"] { grid-column:2; grid-row:1; }
.dp[data-dir="1"] { grid-column:3; grid-row:1; }
.dp[data-dir="6"] { grid-column:1; grid-row:2; }
.dp[data-dir="-1"] { grid-column:2; grid-row:2; }
.dp[data-dir="2"] { grid-column:3; grid-row:2; }
.dp[data-dir="5"] { grid-column:1; grid-row:3; }
.dp[data-dir="4"] { grid-column:2; grid-row:3; }
.dp[data-dir="3"] { grid-column:3; grid-row:3; }
.dp-turn-icon { width:30px; height:30px; }
.dp-turn-icon.mirror { transform:scaleX(-1); }
.dp-neutral { font-size:16px; color:#a09060; }
.dp-neutral.turn-on { background:#5a3c1c; border-color:#f0d080; color:#f0d080; }

/* 右側の攻撃・袋ボタン。dpadの高さいっぱいに引き伸ばして上下に配置する */
#right-btns {
  display:flex; flex-direction:column; justify-content:space-between;
  align-self:stretch; flex-shrink:0;
}
#attack-btn {
  width:70px; height:120px; border-radius:10px;
  font-family:'Courier New',monospace; cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  background:#3a1414; border:2px solid #8a4030;
  color:#ff9070; font-size:21px; letter-spacing:2px;
}
#attack-btn:active { background:#6a2418; border-color:#ff9070; }

/* 左側のボタン列（弓矢・ダッシュ・待機）。キーパッドの高さいっぱいに
   引き伸ばして、dpadの3段に合わせて上段・中段・下段に配置する */
#left-btns {
  display:flex; flex-direction:column; justify-content:space-between;
  align-self:stretch; flex-shrink:0;
}

/* 弓矢・ダッシュ・待機・袋の共通の角丸長方形ボタンスタイル */
#bow-btn, #dash-btn, #wait-btn, #inv-btn {
  width:70px; height:80px; border-radius:12px;
  background:#2a1c0c; border:2px solid #6a5430;
  color:#f0d080; font-size:14px; font-family:'Courier New',monospace;
  cursor:pointer; line-height:1.3; flex-shrink:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none;
}
#bow-btn:active, #dash-btn:active, #wait-btn:active, #inv-btn:active { background:#5a3c1c; }
#inv-btn { height:120px; } /* 攻撃ボタンと同じ大きさに揃える */
#inv-count { font-size:13px; color:#c0a860; }
#dash-btn.dash-on { background:#1c4a2c; border-color:#40e080; color:#40e080; }
#bow-icon { width:36px; height:36px; }

#overlay { position:absolute; top:0; left:0; right:0; bottom:0; pointer-events:none; z-index:20; }

/* モーダル共通 */
#inv-modal, #action-modal {
  position:fixed; inset:0; z-index:40;
  background:rgba(0,0,0,0.6);
  display:none; align-items:center; justify-content:center;
}
#inv-modal.show, #action-modal.show { display:flex; }

#underfoot-modal {
  position:fixed; inset:0; z-index:42;
  background:rgba(0,0,0,0.6);
  display:none; align-items:center; justify-content:center;
}
#underfoot-modal.show { display:flex; }

#inv-panel {
  width:340px; max-width:440px; max-height:560px;
  background:#15110a; border:1px solid #4a3a20; border-radius:8px;
  display:flex; flex-direction:column; overflow:hidden;
}
#inv-header {
  display:flex; justify-content:space-between; align-items:center;
  padding:12px 16px; border-bottom:1px solid #3a2c18;
  color:#f0d080; font-size:15px; letter-spacing:2px;
}
#inv-header button {
  background:#2a2010; border:1px solid #4a3a20; color:#f0d080;
  font-size:12px; padding:4px 10px; margin-left:6px; cursor:pointer;
  font-family:'Courier New',monospace; border-radius:4px;
}
#inv-list { overflow-y:auto; padding:8px; flex:1 1 auto; min-height:0; }
.inv-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; margin-bottom:4px;
  background:#1c1610; border:1px solid #2a2014; border-radius:5px;
  cursor:pointer; color:#c8b89a; font-size:14px;
}
.inv-item:active { background:#2a2014; }
.inv-item.equipped { border-color:#c0a040; background:#241c10; }
.inv-icon { font-size:20px; width:28px; text-align:center; }
.inv-name { flex:1; }
.inv-eq { color:#ffd040; font-weight:bold; font-size:12px; border:1px solid #c0a040; border-radius:3px; padding:1px 5px; }
.inv-plus { color:#80c0ff; font-size:13px; }
.inv-stat { color:#ff9060; font-weight:bold; font-size:12px; border:1px solid #a05838; border-radius:3px; padding:1px 5px; flex-shrink:0; }
.inv-empty { text-align:center; color:#6a5a40; padding:30px; font-size:13px; }

#inv-footer {
  padding:10px 12px; border-top:1px solid #3a2c18; flex-shrink:0;
  display:flex; flex-direction:column; gap:8px;
}
#inv-footer-row { display:flex; align-items:stretch; gap:8px; }
#inv-underfoot {
  flex:1 1 auto; min-width:0; background:#1c2a1a; border:1px solid #3a6a30; color:#90d080;
  font-size:13px; letter-spacing:1px; padding:11px; border-radius:6px;
  font-family:'Courier New',monospace; cursor:pointer;
  display:flex; align-items:center; gap:10px;
}
#inv-sort {
  flex-shrink:0; background:#2a2010; border:1px solid #4a3a20; color:#f0d080;
  font-size:12px; padding:4px 10px; cursor:pointer;
  font-family:'Courier New',monospace; border-radius:4px;
}
#inv-underfoot:active { background:#2a4a24; }
#inv-underfoot .uf-label {
  flex-shrink:0; color:#90d080; border:1px solid #3a6a30; border-radius:4px;
  padding:2px 8px; font-size:12px;
}
#inv-underfoot .uf-item { flex:1; text-align:left; color:#e8d4a0; }
#inv-underfoot.empty { opacity:0.5; }
#inv-underfoot.empty .uf-item { color:#6a5a40; }
#inv-suspend {
  width:100%; background:#1a2a2c; border:1px solid #3a6a68; color:#80d0c8;
  font-size:13px; letter-spacing:2px; padding:11px; border-radius:6px;
  font-family:'Courier New',monospace; cursor:pointer;
}
#inv-suspend:active { background:#2a4a48; }

/* アクションメニュー */
#action-panel, .action-panel-box {
  width:280px; max-width:320px;
  background:#15110a; border:1px solid #4a3a20; border-radius:8px;
  padding:16px; display:flex; flex-direction:column; gap:8px;
}
#action-title, #underfoot-title {
  color:#f0d080; font-size:15px; text-align:center;
  padding-bottom:10px; border-bottom:1px solid #3a2c18; margin-bottom:4px;
}
.act-btn {
  background:#2a2010; border:1px solid #4a3a20; color:#e0c890;
  font-size:14px; padding:12px; cursor:pointer; border-radius:5px;
  font-family:'Courier New',monospace;
}
.act-btn[data-act="cancel"], .act-btn[data-uf="cancel"] { color:#a08860; }
.act-btn[data-uf="pick"] { color:#90d080; }
.act-btn:active { background:#3a2c18; }

/* 確認モーダル（YES/NO） */
#confirm-modal {
  position:fixed; inset:0; z-index:45;
  background:rgba(0,0,0,0.65);
  display:none; align-items:center; justify-content:center;
}
#confirm-modal.show { display:flex; }
#confirm-panel {
  width:240px; max-width:300px;
  background:#15110a; border:1px solid #4a3a20; border-radius:8px;
  padding:18px; display:flex; flex-direction:column; gap:10px;
}
#confirm-title {
  color:#f0d080; font-size:15px; text-align:center;
  padding-bottom:10px; border-bottom:1px solid #3a2c18; margin-bottom:4px;
  line-height:1.5;
}
.confirm-btn {
  background:#2a2010; border:1px solid #4a3a20; color:#e0c890;
  font-size:14px; padding:12px; cursor:pointer; border-radius:5px;
  font-family:'Courier New',monospace;
}
.confirm-btn:active { background:#3a2c18; }
#confirm-yes { color:#80e090; border-color:#3a6040; }
#confirm-no { color:#a08860; }

/* セリフウィンドウ */
#dialogue-box {
  position:absolute; left:10px; right:10px; bottom:10px;
  background:rgba(10,8,4,0.92); border:2px solid #6a5430; border-radius:8px;
  padding:12px 14px 10px; z-index:25;
  box-shadow:0 4px 14px rgba(0,0,0,0.5);
  pointer-events:none;
  opacity:0; transition:opacity 0.35s ease;
}
#dialogue-box.show { opacity:1; pointer-events:auto; }
#dialogue-name {
  color:#f0d080; font-size:12px; letter-spacing:2px; margin-bottom:6px;
  border-bottom:1px solid #3a2c18; padding-bottom:5px;
}
#dialogue-text {
  color:#e8d4a0; font-size:13.5px; line-height:1.6; letter-spacing:0.5px;
  white-space:pre-line;
}
#dialogue-hint {
  color:#8a7a58; font-size:10px; text-align:right; margin-top:8px;
}

/* タイトル画面 */
#title-screen {
  position:fixed; inset:0; z-index:100;
  background:radial-gradient(ellipse at center, #1a140c 0%, #050403 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:34px; font-family:'Courier New',monospace;
}
#title-screen.hide { display:none; }
#title-logo {
  color:#f0d080; font-size:32px; letter-spacing:2px; text-align:center;
  text-shadow:0 0 18px rgba(240,208,128,0.35), 0 2px 3px rgba(0,0,0,0.6);
  line-height:1.4;
}
#title-logo .sub-jp {
  display:block; font-size:12px; color:#9a8458; letter-spacing:4px; margin-top:10px;
}
#title-logo .title-ver {
  display:block; font-size:11px; color:#7a6a48; letter-spacing:2px; margin-top:8px;
}
#title-buttons { display:flex; flex-direction:column; gap:14px; width:260px; max-width:280px; }
.title-btn {
  background:#1c1610; border:2px solid #6a5430; color:#e8d4a0;
  font-size:15px; letter-spacing:4px; padding:14px; border-radius:8px;
  font-family:'Courier New',monospace; cursor:pointer;
}
.title-btn:active { background:#3a2c18; }
.title-btn:disabled { opacity:0.32; color:#5a4e38; cursor:default; }
#title-footer { color:#5a4e38; font-size:10px; letter-spacing:1px; }

/* セーブスロット表示 */
.slot-btn { text-align:left; padding:0; overflow:hidden; }
.slot-head {
  display:flex; justify-content:space-between; align-items:baseline;
  padding:10px 12px 8px; border-bottom:1px solid #4a3a20;
}
.slot-name { color:#f0d080; font-size:14px; letter-spacing:2px; }
.slot-date { color:#7ac89a; font-size:11px; letter-spacing:0.5px; }
.slot-body { padding:9px 12px; display:flex; flex-direction:column; gap:4px; }
.slot-row { display:flex; justify-content:space-between; font-size:12px; }
.slot-k { color:#9a8458; letter-spacing:1px; }
.slot-v { color:#e8d4a0; letter-spacing:1px; }
.slot-empty { padding:16px 12px; text-align:center; color:#6a5a40; font-size:12px; display:none; }
.slot-btn.empty .slot-body { display:none; }
.slot-btn.empty .slot-date { display:none; }
.slot-btn.empty .slot-empty { display:block; }
.slot-btn.empty .slot-name { color:#8a7a58; }

/* 暗転フェード（死亡時など） */
#fade-overlay {
  position:fixed; inset:0; z-index:90;
  background:#000; opacity:0; pointer-events:none;
  transition:opacity 0.5s ease;
}
#fade-overlay.show { opacity:1; }
#fade-overlay.fast { transition:opacity 0.22s ease; }
#fade-overlay.floor-fade { transition:opacity 0.4s ease; }

/* フロア遷移時の階数表示 */
#floor-announce {
  position:fixed; inset:0; z-index:91;
  display:flex; align-items:center; justify-content:center;
  color:#f0d080; font-family:'Courier New',monospace;
  font-size:34px; letter-spacing:4px;
  text-shadow:0 0 16px rgba(240,208,128,0.5), 0 2px 4px #000;
  opacity:0; pointer-events:none;
  transition:opacity 0.4s ease;
}
#floor-announce.show { opacity:1; }
</style>
</head>
<body>
<div id="viewport-root">
<div id="fade-overlay"></div>
<div id="floor-announce"></div>
<div id="title-screen">
  <div id="title-logo">Wanderer's Dungeon<span class="title-ver">ver 0.9.29</span></div>
  <div id="title-buttons">
    <button id="title-continue" class="title-btn slot-btn">
      <div class="slot-head">
        <span class="slot-name">つづきから</span>
        <span class="slot-date" id="slot-date"></span>
      </div>
      <div class="slot-body" id="slot-body">
        <div class="slot-row"><span class="slot-k">現在地</span><span class="slot-v" id="slot-loc">—</span></div>
        <div class="slot-row"><span class="slot-k">Lv</span><span class="slot-v" id="slot-lv">—</span></div>
        <div class="slot-row"><span class="slot-k">所持金</span><span class="slot-v" id="slot-gold">—</span></div>
        <div class="slot-row"><span class="slot-k">プレイ時間</span><span class="slot-v" id="slot-time">—</span></div>
      </div>
      <div class="slot-empty" id="slot-empty">（セーブデータなし）</div>
    </button>
    <button id="title-newgame" class="title-btn">はじめから</button>
  </div>
  <div id="title-footer">Three.js Voxel Roguelike</div>
</div>
<div id="game-area">
  <div id="ui">
    <div id="topbar">
      <div id="topbar-bars">
        <div class="tb-item"><span class="tb-label">EXP</span><span id="exp-disp">0/10</span><span class="stat-bar"><span class="stat-bar-fill" id="exp-bar"></span></span></div>
        <div class="tb-item"><span class="tb-label">HP</span><span id="hp-disp">15/15</span><span class="stat-bar"><span class="stat-bar-fill" id="hp-bar"></span></span></div>
        <div class="tb-item"><span class="tb-label">満腹</span><span id="food-disp">100</span>%<span class="stat-bar"><span class="stat-bar-fill" id="food-bar"></span></span></div>
      </div>
      <div id="topbar-stats">
        <div class="tb-item"><span class="tb-label">Lv</span><span id="lv-disp">1</span></div>
        <div class="tb-item"><span class="tb-label">攻</span><span id="atk-disp">5</span></div>
        <div class="tb-item"><span class="tb-label">防</span><span id="def-disp">2</span></div>
        <div class="tb-item"><span class="tb-label">💰</span><span id="gold-disp">0</span></div>
      </div>
    </div>
  </div>
  <div id="floor-indicator">1F</div>
  <button id="camera-toggle">👁 視点切替</button>
  <div id="action-label"></div>
  <div id="dash-indicator">▶ ダッシュモード中</div>
  <div id="turn-counter">Turn 0</div>
  <div id="guide">方向パッドで移動・攻撃</div>
  <canvas id="overlay"></canvas>
  <div id="dialogue-box">
    <div id="dialogue-name"></div>
    <div id="dialogue-text"></div>
    <div id="dialogue-hint">タップで閉じる</div>
  </div>
</div>

<!-- 操作パネル -->
<div id="ctrl-area">

// レターボックス（左右の黒帯）が出ないよう、#viewport-root全体を一様スケールで画面いっぱいに引き伸ばす。
// HUDやボタンは全てこの論理座標系上の絶対px値で配置されているため、機種が変わっても見た目の比率は変わらない。
const LOGICAL_HEIGHT=844; // 基準論理解像度（6.1インチ相当）
// スマートフォンのブラウザはアドレスバーの表示/収縮でwindow.innerHeightが
// 実際の表示領域と一瞬ズレることがあり、それを引きずると下部に黒い余白が残ってしまう。
// visualViewportが使える環境ではそちらの値を優先し、実際に見えている領域に正確に合わせる。
function getRealViewportSize(){
  if(window.visualViewport){
    return { w:window.visualViewport.width, h:window.visualViewport.height };
  }
  return { w:window.innerWidth, h:window.innerHeight };
}
function applyFixedViewport(){
  const root=document.getElementById('viewport-root');
  if(!root)return;
  const {w:realW,h:realH}=getRealViewportSize();
  const scale=realH/LOGICAL_HEIGHT;
  const logicalW=realW/scale;
  root.style.width=logicalW+'px';
  root.style.height=LOGICAL_HEIGHT+'px';
  root.style.transform=`scale(${scale})`;
}

let actx=null;
function getAudioCtx(){
  if(!actx){
    try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }
    catch(e){ console.warn('AudioContext を初期化できませんでした',e); }
  }
  // モバイルではユーザー操作前は再生できないため、そのつど再開を試みる
  if(actx&&actx.state==='suspended'){ actx.resume().catch(()=>{}); }
  return actx;
}
// 初回のタップ/クリックでAudioContextを確実にアンロックする
function unlockAudioOnce(){
  getAudioCtx();
  window.removeEventListener('touchstart',unlockAudioOnce);
  window.removeEventListener('mousedown',unlockAudioOnce);
}

// ノイズバッファ（一度だけ生成して使い回す）
let noiseBuffer=null;
function getNoiseBuffer(ctx){
  if(noiseBuffer)return noiseBuffer;
  const len=ctx.sampleRate*0.5;
  noiseBuffer=ctx.createBuffer(1,len,ctx.sampleRate);
  const d=noiseBuffer.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
  return noiseBuffer;
}

// 自機→敵への攻撃「バシュッ」：ノイズにバンドパスを掛けて素早く下げる
function sfxAttack(){
  const ctx=getAudioCtx(); if(!ctx)return;
  const now=ctx.currentTime;
  const src=ctx.createBufferSource(); src.buffer=getNoiseBuffer(ctx);
  const bp=ctx.createBiquadFilter(); bp.type='bandpass';
  bp.frequency.setValueAtTime(3200,now);
  bp.frequency.exponentialRampToValueAtTime(700,now+0.12);
  bp.Q.value=1.1;
  const gain=ctx.createGain();
  gain.gain.setValueAtTime(0.0001,now);
  gain.gain.exponentialRampToValueAtTime(0.5,now+0.012);
  gain.gain.exponentialRampToValueAtTime(0.0001,now+0.14);
  src.connect(bp); bp.connect(gain); gain.connect(ctx.destination);
  src.start(now); src.stop(now+0.16);
}

// 何もない場所への素振り「シュッ」：命中音より短く軽く高め（衝撃感を出さない）
function sfxSwing(){
  const ctx=getAudioCtx(); if(!ctx)return;
  const now=ctx.currentTime;
  const src=ctx.createBufferSource(); src.buffer=getNoiseBuffer(ctx);
  const bp=ctx.createBiquadFilter(); bp.type='bandpass';
  bp.frequency.setValueAtTime(4200,now);
  bp.frequency.exponentialRampToValueAtTime(1800,now+0.08);
  bp.Q.value=0.8;
  const gain=ctx.createGain();
  gain.gain.setValueAtTime(0.0001,now);
  gain.gain.exponentialRampToValueAtTime(0.28,now+0.008);
  gain.gain.exponentialRampToValueAtTime(0.0001,now+0.09);
  src.connect(bp); bp.connect(gain); gain.connect(ctx.destination);
  src.start(now); src.stop(now+0.1);
}

// 敵→自機への被弾「ドンっ」：低音のサイン波+ノイズの衝撃
function sfxHit(){
  const ctx=getAudioCtx(); if(!ctx)return;
  const now=ctx.currentTime;
  // 低音の「ドン」本体
  const osc=ctx.createOscillator(); osc.type='sine';
  osc.frequency.setValueAtTime(150,now);
  osc.frequency.exponentialRampToValueAtTime(48,now+0.18);
  const oGain=ctx.createGain();
  oGain.gain.setValueAtTime(0.0001,now);
  oGain.gain.exponentialRampToValueAtTime(0.65,now+0.01);
  oGain.gain.exponentialRampToValueAtTime(0.0001,now+0.22);
  osc.connect(oGain); oGain.connect(ctx.destination);
  osc.start(now); osc.stop(now+0.24);
  // 打撃のアタック感を足すノイズ
  const src=ctx.createBufferSource(); src.buffer=getNoiseBuffer(ctx);
  const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=900;
  const nGain=ctx.createGain();
  nGain.gain.setValueAtTime(0.35,now);
  nGain.gain.exponentialRampToValueAtTime(0.0001,now+0.07);
  src.connect(lp); lp.connect(nGain); nGain.connect(ctx.destination);
  src.start(now); src.stop(now+0.08);
}

// 階段の足音「ザッザッザ」：短いノイズバーストを3回
function sfxStairs(){
  const ctx=getAudioCtx(); if(!ctx)return;
  [0,0.15,0.30].forEach(delay=>{
    const now=ctx.currentTime+delay;
    const src=ctx.createBufferSource(); src.buffer=getNoiseBuffer(ctx);
    const bp=ctx.createBiquadFilter(); bp.type='bandpass';
    bp.frequency.value=1800; bp.Q.value=0.7;
    const gain=ctx.createGain();
    gain.gain.setValueAtTime(0.0001,now);
    gain.gain.exponentialRampToValueAtTime(0.32,now+0.008);
    gain.gain.exponentialRampToValueAtTime(0.0001,now+0.09);
    src.connect(bp); bp.connect(gain); gain.connect(ctx.destination);
    src.start(now); src.stop(now+0.1);
  });
}

// アイテム取得「ポンッ」：短いサイン波で軽く音程が上がる
function sfxItem(){
  const ctx=getAudioCtx(); if(!ctx)return;
  const now=ctx.currentTime;
  const osc=ctx.createOscillator(); osc.type='triangle';
  osc.frequency.setValueAtTime(520,now);
  osc.frequency.exponentialRampToValueAtTime(880,now+0.1);
  const gain=ctx.createGain();
  gain.gain.setValueAtTime(0.0001,now);
  gain.gain.exponentialRampToValueAtTime(0.4,now+0.012);
  gain.gain.exponentialRampToValueAtTime(0.0001,now+0.16);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(now); osc.stop(now+0.18);
}

// レベルアップ「ファンファーレ」：上昇する短いアルペジオ
function sfxLevelUp(){
  const ctx=getAudioCtx(); if(!ctx)return;
  const now=ctx.currentTime;
  const notes=[523.25, 659.25, 783.99, 1046.5]; // C5, E5, G5, C6
  notes.forEach((freq,i)=>{
    const t=now+i*0.09;
    const osc=ctx.createOscillator(); osc.type='triangle';
    osc.frequency.setValueAtTime(freq,t);
    const gain=ctx.createGain();
    gain.gain.setValueAtTime(0.0001,t);
    gain.gain.exponentialRampToValueAtTime(0.35,t+0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001,t+0.22);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t+0.24);
  });
}

function updateHighlight(show){

    const rawX=DIR_DX[state.dir], rawZ=DIR_DY[state.dir];
    const mag=Math.hypot(rawX,rawZ)||1;
    const ux=rawX/mag, uz=rawZ/mag;
    // 線の中心を自機から向き方向へ半分ずらす
    const cx=px+ux*len/2;

// 部屋にいれば同室のオブジェクトを表示、通路なら隣接1マスのみ表示
function updateObjectVisibility(){
  if(state.inEntrance){
    // エントランスは常に全て見える
    enemies.forEach(e=>{ if(e.mesh)e.mesh.visible=true; });
    floorItems.forEach(i=>{ if(i.mesh)i.mesh.visible=true; });
    objectMeshes.forEach(m=>{ m.visible=true; });
    return;
  }
  const myRoom=rooms.find(r=>state.x>=r.x&&state.x<r.x+r.w&&state.y>=r.y&&state.y<r.y+r.h);
  function visibleAt(gx,gy){
    if(gx===undefined||gy===undefined)return true;
    if(myRoom){
      // 同じ部屋の中なら見える
      if(gx>=myRoom.x&&gx<myRoom.x+myRoom.w&&gy>=myRoom.y&&gy<myRoom.y+myRoom.h)return true;
    }
    // 隣接1マス（斜め含む）なら見える
    if(Math.abs(gx-state.x)<=1&&Math.abs(gy-state.y)<=1)return true;
    return false;
  }
  // 敵
  enemies.forEach(e=>{ if(e.mesh)e.mesh.visible=visibleAt(e.x,e.y); });
  // アイテム
  floorItems.forEach(i=>{ if(i.mesh)i.mesh.visible=visibleAt(i.x,i.y); });
  // 階段・帰還など（userDataにgx/gyを持つobjectMeshes）
  objectMeshes.forEach(m=>{
    if(m.userData&&m.userData.gx!==undefined){
      m.visible=visibleAt(m.userData.gx,m.userData.gy);
    }
  });
}

// 最短経路での角度差（-PI〜PIに正規化）
function angleDiff(a,b){
  let d=(b-a)%(Math.PI*2);
  if(d>Math.PI)d-=Math.PI*2;
  if(d<-Math.PI)d+=Math.PI*2;
  return d;
}
// 表示上の向き(state.angle)を目標(state.targetAngle)へ滑らかに近づける（一人称その場旋回用の中割り）
function updatePlayerAngleSmooth(dt){
  const diff=angleDiff(state.angle,state.targetAngle);
  if(Math.abs(diff)<0.001){
    state.angle=state.targetAngle;
  }else{
    const k=Math.min(dt*7,1);
    state.angle+=diff*k;
  }
  playerGroup.rotation.y=-state.angle+Math.PI/2;
}
// 表示座標を論理座標へ滑らかに近づける
function updatePlayerSmooth(dt){
  const tx=state.x*CELL, tz=state.y*CELL;
  const k=Math.min(dt*5,1); // 補間速度（小さいほど滑らか）
  // カメラは攻撃突進などの演出モーションを無視し、論理座標だけを追従する
  camX+=(tx-camX)*k;
  camZ+=(tz-camZ)*k;
  // 突進アニメ中はそちらに任せる（干渉回避）
  if(anims.some(a=>a.mesh===playerGroup))return;
  playerGroup.position.x+=(tx-playerGroup.position.x)*k;
  playerGroup.position.z+=(tz-playerGroup.position.z)*k;
}
// 敵の表示座標も自機と同様に論理座標へ滑らかに近づける
function updateEnemiesSmooth(dt){
  const k=Math.min(dt*7,1);
  enemies.forEach(e=>{
    if(e.hp<=0)return;
    // 突進アニメ中はそちらに任せる（干渉回避）
    if(anims.some(a=>a.mesh===e.mesh))return;
    const tx=e.x*CELL, tz=e.y*CELL;
    e.mesh.position.x+=(tx-e.mesh.position.x)*k;
    e.mesh.position.z+=(tz-e.mesh.position.z)*k;
  });
}

// マップ生成
function generateMap(floor){
  const m=Array.from({length:MAP_H},()=>Array(MAP_W).fill(1));
  const rs=[];

  // 10Fは1部屋のみ（ボス部屋）
  if(floor===10){
    const rw=16,rh=16;
    const rx=Math.floor((MAP_W-rw)/2),ry=Math.floor((MAP_H-rh)/2);
    for(let y=ry;y<ry+rh;y++)for(let x=rx;x<rx+rw;x++)m[y][x]=0;
    rs.push({x:rx,y:ry,w:rw,h:rh,cx:Math.floor(rx+rw/2),cy:Math.floor(ry+rh/2)});
    return{cells:m,rooms:rs};
  }

  const cnt=4+Math.floor(Math.random()*3);
  for(let att=0;att<300&&rs.length<cnt;att++){
    const rw=4+Math.floor(Math.random()*6),rh=4+Math.floor(Math.random()*6);
    const rx=1+Math.floor(Math.random()*(MAP_W-rw-2)),ry=1+Math.floor(Math.random()*(MAP_H-rh-2));
    if(rs.some(r=>rx<=r.x+r.w+1&&rx+rw+1>=r.x&&ry<=r.y+r.h+1&&ry+rh+1>=r.y))continue;
    for(let y=ry;y<ry+rh;y++)for(let x=rx;x<rx+rw;x++)m[y][x]=0;
    rs.push({x:rx,y:ry,w:rw,h:rh,cx:Math.floor(rx+rw/2),cy:Math.floor(ry+rh/2)});
  }
  for(let i=1;i<rs.length;i++){
    const a=rs[i-1],b=rs[i];let cx=a.cx,cy=a.cy;
    while(cx!==b.cx){m[cy][cx]=0;cx+=cx<b.cx?1:-1;}
    while(cy!==b.cy){m[cy][cx]=0;cy+=cy<b.cy?1:-1;}
  }
  // 別々の部屋間通路がたまたま隣接して2マス幅に見えてしまう箇所を、
  // 全体の連結性を保ったまま1マス幅に間引く
  thinWideCorridors(m,rs,MAP_W,MAP_H);
  // どの部屋にも繋がらない行き止まりの通路（枝分かれの先端）を除去する
  pruneDeadEndCorridors(m,rs,MAP_W,MAP_H);
  return{cells:m,rooms:rs};
}

// 部屋の外にある通路マスのうち、隣接する通路/部屋が1つ以下（＝行き止まり）のものを
// 壁に戻す。行き止まりは接続の要にはなり得ないため、連結性を損なわず安全に除去できる
function pruneDeadEndCorridors(m,rooms,W,H){
  function inAnyRoom(x,y){ return rooms.some(r=>x>=r.x&&x<r.x+r.w&&y>=r.y&&y<r.y+r.h); }
  let changed=true,guard=0;
  while(changed&&guard<3000){
    changed=false;guard++;
    for(let y=0;y<H;y++){
      for(let x=0;x<W;x++){
        if(m[y][x]!==0||inAnyRoom(x,y))continue;
        let deg=0;
        [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dy])=>{
          const nx=x+dx,ny=y+dy;
          if(nx>=0&&nx<W&&ny>=0&&ny<H&&m[ny][nx]===0)deg++;
        });
        if(deg<=1){ m[y][x]=1; changed=true; }
      }
    }
  }
}

// 通路が偶然重なって2マス以上の幅になっている箇所を検出し、
// 部屋同士の連結性（通行可能性）を崩さない範囲で1マス幅に間引く
function thinWideCorridors(m,rooms,W,H){
  function inAnyRoom(x,y){ return rooms.some(r=>x>=r.x&&x<r.x+r.w&&y>=r.y&&y<r.y+r.h); }
  function isFloor(x,y){ return x>=0&&x<W&&y>=0&&y<H&&m[y][x]===0; }
  function countComponents(){
    const seen=Array.from({length:H},()=>Array(W).fill(false));
    let comps=0;
    for(let y=0;y<H;y++)for(let x=0;x<W;x++){
      if(m[y][x]!==0||seen[y][x])continue;
      comps++;
      const stack=[[x,y]];seen[y][x]=true;
      while(stack.length){
        const [cx,cy]=stack.pop();
        [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dy])=>{
          const nx=cx+dx,ny=cy+dy;
          if(isFloor(nx,ny)&&!seen[ny][nx]){seen[ny][nx]=true;stack.push([nx,ny]);}
        });
      }
    }
    return comps;
  }
  const baseComps=countComponents();
  let changed=true,guard=0;
  while(changed&&guard<2000){
    changed=false;guard++;
    for(let y=0;y<H&&!changed;y++){
      for(let x=0;x<W&&!changed;x++){
        if(m[y][x]!==0||inAnyRoom(x,y))continue;
        // このマスを左上とする2x2が全て通路（部屋外の床）なら幅2以上とみなす
        if(isFloor(x+1,y)&&!inAnyRoom(x+1,y)&&isFloor(x,y+1)&&!inAnyRoom(x,y+1)&&isFloor(x+1,y+1)&&!inAnyRoom(x+1,y+1)){
          for(const [tx,ty] of [[x+1,y+1],[x+1,y],[x,y+1],[x,y]]){
            m[ty][tx]=1;
            if(countComponents()===baseComps){changed=true;break;}
            m[ty][tx]=0; // 連結性が崩れる場合は元に戻して次の候補を試す
          }
        }
      }
    }
  }
}
function rndInRoom(r){return{x:r.x+1+Math.floor(Math.random()*Math.max(1,r.w-2)),y:r.y+1+Math.floor(Math.random()*Math.max(1,r.h-2))};}

// エントランス固定マップ生成（縦15x横7の本体 + 4部屋7x7）
function generateEntranceMap(){
  const m=Array.from({length:MAP_H},()=>Array(MAP_W).fill(1));
  const rs=[];

  // オフセット（マップ中央寄りに配置）
  const OX=3, OY=7;

  // エントランス本体：横7 x 縦15
  const cx0=OX+7+1; // 左部屋(7)+通路(1)
  const cy0=OY;
  const cw=7, ch=15;
  for(let y=cy0;y<cy0+ch;y++)for(let x=cx0;x<cx0+cw;x++)m[y][x]=0;
  const centerRoom={x:cx0,y:cy0,w:cw,h:ch,cx:cx0+3,cy:cy0+7,id:'center'};
  rs.push(centerRoom);

  // 4部屋（各7x7）
  const leftX=OX, rightX=cx0+cw+1;
  const topY=OY, botY=OY+8;

  const storageRoom={x:leftX,y:topY,w:7,h:7,cx:leftX+3,cy:topY+3,id:'storage'};
  const shopRoom   ={x:leftX,y:botY,w:7,h:7,cx:leftX+3,cy:botY+3,id:'shop'};
  const bankRoom   ={x:rightX,y:topY,w:7,h:7,cx:rightX+3,cy:topY+3,id:'bank'};
  const spaceRoom  ={x:rightX,y:botY,w:7,h:7,cx:rightX+3,cy:botY+3,id:'space'};
  [storageRoom,shopRoom,bankRoom,spaceRoom].forEach(r=>{
    for(let y=r.y;y<r.y+r.h;y++)for(let x=r.x;x<r.x+r.w;x++)m[y][x]=0;
    rs.push(r);
  });

  // 通路で接続（各部屋の中心行/列からエントランス本体まで一直線）
  function carveH(y,xFrom,xTo){const s=Math.min(xFrom,xTo),e=Math.max(xFrom,xTo);for(let x=s;x<=e;x++)m[y][x]=0;}
  carveH(storageRoom.cy, storageRoom.x+storageRoom.w-1, cx0); // 倉庫→本体
  carveH(shopRoom.cy,    shopRoom.x+shopRoom.w-1, cx0);       // ショップ→本体
  carveH(bankRoom.cy,    cx0+cw-1, bankRoom.x);               // 本体→銀行
  carveH(spaceRoom.cy,   cx0+cw-1, spaceRoom.x);              // 本体→スペース

  return{cells:m,rooms:rs, doorX:cx0+3, doorY:cy0, startX:cx0+3, startY:cy0+ch-4,
    storageRoom, shopRoom, bankRoom, spaceRoom, centerRoom};
}

// ダンジョン構築
function buildDungeon(){
  const fGeo=new THREE.PlaneGeometry(CELL,CELL);
  const cGeo=new THREE.PlaneGeometry(CELL,CELL);
  const wGeo=new THREE.BoxGeometry(CELL,WALL_H,0.12);
  const bGeo=new THREE.BoxGeometry(CELL,WALL_H,CELL);
  // フロアの深度帯ごとにダンジョンらしい壁テクスチャを貼る（エントランスは従来通り単色）
  const useWallTexture=!state.inEntrance;
  let texturedWallMat=null;
  if(useWallTexture){
    const tex=getWallTextureForFloor(state.floor);
    tex.repeat.set(3,4);
    texturedWallMat=new THREE.MeshLambertMaterial({map:tex});
  }
  const wMat=()=>useWallTexture?texturedWallMat:new THREE.MeshLambertMaterial({color:0x3a2410});
  // 床は全フロア共通の石畳テクスチャを貼る（エントランスも含む）
  const floorTex=getFloorTexture();
  floorTex.repeat.set(1,1);
  const fMat=new THREE.MeshLambertMaterial({map:floorTex});
  // 天井はコンクリート風テクスチャを貼る（一人称モードの時だけ表示する）
  let cMat;
  if(useWallTexture){
    const ceilTex=getCeilingTexture();
    ceilTex.repeat.set(1,1);
    cMat=new THREE.MeshLambertMaterial({map:ceilTex});
  } else {
    cMat=new THREE.MeshLambertMaterial({color:0x0c0804});
  }
  for(let y=0;y<MAP_H;y++){
    for(let x=0;x<MAP_W;x++){
      const wx=x*CELL,wz=y*CELL;
      if(MAP[y][x]===0){
        const fl=new THREE.Mesh(fGeo,fMat);fl.rotation.x=-Math.PI/2;fl.position.set(wx,0,wz);fl.receiveShadow=true;scene.add(fl);
        const cl=new THREE.Mesh(cGeo,cMat);cl.rotation.x=Math.PI/2;cl.position.set(wx,WALL_H,wz);cl.visible=firstPersonMode;scene.add(cl);ceilingMeshes.push(cl);
        [{dx:0,dz:-1,ry:0,ox:0,oz:-CELL/2},{dx:0,dz:1,ry:Math.PI,ox:0,oz:CELL/2},{dx:-1,dz:0,ry:Math.PI/2,ox:-CELL/2,oz:0},{dx:1,dz:0,ry:-Math.PI/2,ox:CELL/2,oz:0}].forEach(s=>{
          const nx=x+s.dx,ny=y+s.dz;
          if(nx<0||nx>=MAP_W||ny<0||ny>=MAP_H||MAP[ny][nx]===1){
            const wm=new THREE.Mesh(wGeo,wMat());wm.position.set(wx+s.ox,WALL_H/2,wz+s.oz);wm.rotation.y=s.ry;wm.castShadow=true;wm.receiveShadow=true;
            wm.userData.gx=x;wm.userData.gz=y;
            scene.add(wm);wallMeshes.push(wm);
          }
        });
      } else {
        const bm=new THREE.Mesh(bGeo,wMat());bm.position.set(wx,WALL_H/2,wz);bm.castShadow=true;bm.receiveShadow=true;
        bm.userData.gx=x;bm.userData.gz=y;
        scene.add(bm);wallMeshes.push(bm);
      }
    }
  }
}

// 巻物を読む（使い切り）
function useScroll(it){
  const db=ITEM_DB[it.key];
  const eff=db.effect.scroll;
  const visEnemies=enemies.filter(e=>e.hp>0&&e.mesh.visible);
  switch(eff){
    case 'enchantWeapon': {
      if(equippedWeapon){ equippedWeapon.plus++; showAction(`${ITEM_DB[equippedWeapon.key].name}が+${equippedWeapon.plus}に輝いた！`,1500); }
      else { showAction('強化できる武器がない…',1200); }
      break;
    }
    case 'enchantShield': {
      if(equippedArmor){ equippedArmor.plus++; showAction(`${ITEM_DB[equippedArmor.key].name}が+${equippedArmor.plus}に輝いた！`,1500); }
      else { showAction('強化できる盾がない…',1200); }
      break;
    }
    case 'fireAll':
      if(visEnemies.length===0){ showAction('何も起きなかった…',1000); break; }
      visEnemies.forEach(e=>{
        e.hp-=db.effect.power;
        spawnDamageNum(e.mesh.position.x,2.0,e.mesh.position.z,`🔥${db.effect.power}`,'#ffffff');
        if(e.hp<=0)damageEnemy(e,0);
      });
      triggerFlash('rgba(255,100,0,');
      showAction('炎が周囲を包んだ！',1500);
      break;
    case 'teleport': {
      let room,p,tries=0;
      do {
        room=rooms[Math.floor(Math.random()*rooms.length)];
        p=rndInRoom(room);
        tries++;
      } while(tries<30 && enemies.some(e=>e.hp>0&&e.x===p.x&&e.y===p.y));
      state.x=p.x; state.y=p.y;
      playerGroup.position.set(state.x*CELL,0,state.y*CELL);
      camX=state.x*CELL;camZ=state.y*CELL;
      updatePlayerPos();updateExplored();
      showAction('体がふわっと浮いて移動した！',1500);
      break;
    }
    case 'return':
      if(state.inEntrance){ showAction('ここでは使えない…',1200); break; }
      setLog('帰還');
      fadeTransition(()=>{
        resetPlayerStatsForEntrance();
        initEntrance();
      }, 'エントランス');
      break;
    case 'pitfall':
      if(state.floor>=10){ showAction('これ以上は落ちられない…',1200); break; }
      state.floor++; showAction('床が抜けて落下した！',1500); setLog(`${state.floor}F`); initFloor(state.floor);
      break;
    case 'confuseAll':
      if(visEnemies.length===0){ showAction('何も起きなかった…',1000); break; }
      visEnemies.forEach(e=>{ e.confused=(e.confused||0)+8; });
      showAction('周囲の敵が混乱した！',1500);
      break;
    case 'sleepAll':
      if(visEnemies.length===0){ showAction('何も起きなかった…',1000); break; }
      visEnemies.forEach(e=>{ e.sleep=(e.sleep||0)+8; });
      showAction('周囲の敵が眠った！',1500);
      break;
    case 'luck':
      if(state.lv>=MAX_LEVEL){ showAction('これ以上レベルは上がらない…',1200); break; }
      state.lv++;
      state.nextExp = state.lv<MAX_LEVEL ? (LEVEL_EXP_TOTAL[state.lv+1]-LEVEL_EXP_TOTAL[state.lv]) : Infinity;
      state.maxHp+=5;
      state.hp=state.maxHp;
      showAction(`幸運の巻物の効果でLv${state.lv}にあがった！ HP全回復`,2000);
      sfxLevelUp();
      updateUI();
      break;
    case 'damageAll':
      if(visEnemies.length===0){ showAction('何も起きなかった…',1000); break; }
      visEnemies.forEach(e=>{
        e.hp-=db.effect.power;
        spawnDamageNum(e.mesh.position.x,2.0,e.mesh.position.z,`${db.effect.power}`,'#ffffff');
        if(e.hp<=0)damageEnemy(e,0);
      });
      triggerFlash('rgba(255,220,80,');
      showAction('衝撃波が周囲を襲った！',1500);
      break;
    case 'map':
      for(let yy=0;yy<MAP_H;yy++)for(let xx=0;xx<MAP_W;xx++){ if(MAP[yy][xx]===0) explored[yy][xx]=true; }
      showAction('フロアの地図が頭に浮かんだ！',1500);
      break;
    case 'sealAll':
      if(visEnemies.length===0){ showAction('何も起きなかった…',1000); break; }
      visEnemies.forEach(e=>{ e.sealed=10; });
      showAction('周囲の敵の能力を封じた！',1500);
      break;
    default:
      showAction('何も起きなかった…',1000);
  }
  removeFromInv(it);
  updateUI();
}


function useStaff(it){

  it.charges--;

  const dx=DIR_DX[state.dir], dz=DIR_DY[state.dir];

// 杖の光弾演出＋効果適用（必中）
function fireWandBolt(dx,dz,eff,target){
  // ロジック即時：命中していれば効果を確定
  if(target){
    applyWandEffect(eff,target,dx,dz);
  }
  // 見た目の光弾（魔法演出と同様）
  const geo=new THREE.SphereGeometry(0.13,6,6);
  const mat=new THREE.MeshBasicMaterial({color:0xffe060});
  const bolt=new THREE.Mesh(geo,mat);
  bolt.position.set(state.x*CELL,0.9,state.y*CELL);
  scene.add(bolt);
  const lt=new THREE.PointLight(0xffe060,3,2);
  bolt.add(lt);
  const tx=target?target.x*CELL:state.x*CELL+dx*CELL*6;
  const tz=target?target.y*CELL:state.y*CELL+dz*CELL*6;
  wandBolts.push({mesh:bolt,dx,dz,targetX:tx,targetY:tz,dist:0});
}

const wandBolts=[];
function updateWandBolts(dt){
  for(let i=wandBolts.length-1;i>=0;i--){
    const b=wandBolts[i];
    const speed=11;
    b.dist+=speed*dt;
    b.mesh.position.x+=b.dx*speed*dt*CELL;
    b.mesh.position.z+=b.dz*speed*dt*CELL;
    const reached=(b.dx!==0 ? (b.dx>0?b.mesh.position.x>=b.targetX:b.mesh.position.x<=b.targetX)
                            : (b.dz!==0 ? (b.dz>0?b.mesh.position.z>=b.targetY:b.mesh.position.z<=b.targetY) : true));
    if(reached||b.dist>25){
      triggerFlash('rgba(255,220,80,');
      scene.remove(b.mesh);
      wandBolts.splice(i,1);
    }
  }
}

// 杖の効果を敵に適用（投げた薬と同じ必中ロジック）
function applyWandEffect(eff,e,wdx,wdz){
  // 命中すれば眠っていても目を覚まし、自機に気づく
  e.aware=true;
  switch(eff.wand){
    case 'damage':
      e.hp-=eff.power;
      spawnDamageNum(e.mesh.position.x,2.0,e.mesh.position.z,`${eff.power}`,'#ffffff');
      if(e.hp<=0)damageEnemy(e,0);
      break;
    case 'fire':
      e.hp-=eff.power;
      spawnDamageNum(e.mesh.position.x,2.0,e.mesh.position.z,`🔥${eff.power}`,'#ffffff');
      if(e.hp<=0)damageEnemy(e,0);
      break;
    case 'sleep':
      e.sleep=(e.sleep||0)+8; showAction('敵が眠った！',1000);
      break;
    case 'confuse':
      e.confused=(e.confused||0)+8; showAction('敵が混乱した！',1000);
      break;
    case 'swap': {
      const ex=e.x,ey=e.y;
      if(isWalkable(state.x,state.y)){
        e.x=state.x; e.y=state.y;
        e.mesh.position.set(e.x*CELL,0,e.y*CELL);
      }
      state.x=ex; state.y=ey;
      updatePlayerPos();updateExplored();
      showAction('場所が入れ替わった！',1000);
      break;
    }
    case 'knockback': {
      // 杖を撃った方向（wdx,wdz）へ直線に、進める限り複数マス吹き飛ばす
      const kx=wdx!==undefined?wdx:Math.sign(e.x-state.x);
      const kz=wdz!==undefined?wdz:Math.sign(e.y-state.y);
      let nx=e.x, ny=e.y;
      for(let s=1;s<=4;s++){
        const tx=e.x+kx*s, ty=e.y+kz*s;
        if(!isWalkable(tx,ty))break;
        if(enemies.some(o=>o!==e&&o.x===tx&&o.y===ty))break;
        nx=tx; ny=ty;
      }
      e.x=nx; e.y=ny;
      e.mesh.position.set(e.x*CELL,0,e.y*CELL);
      showAction('敵を吹き飛ばした！',1000);
      break;
    }
    case 'weaken':
      e.atkDown=(e.atkDown||0)+Math.ceil((MONSTER_DB[e.monType]?.atk||e.atk)*0.3);
      showAction('敵の攻撃力が下がった！',1000);
      break;
    case 'seal': {
      e.sealed=10;
      const sealName=MONSTER_DB[e.monType]?MONSTER_DB[e.monType].name:'敵';
      showAction(`${sealName}の特殊攻撃を封じた！`,1200);
      break;
    }
    case 'pull': {
      // 自機の目の前のマスまで引き寄せる（対象は直線上にいるので、自機との距離-1マス分進める）
      const dxp=Math.sign(state.x-e.x), dzp=Math.sign(state.y-e.y);
      const dist=Math.max(Math.abs(state.x-e.x), Math.abs(state.y-e.y));
      let nx=e.x, ny=e.y;
      for(let s=0;s<dist-1;s++){
        const tx=e.x+dxp*(s+1), ty=e.y+dzp*(s+1);
        if(!isWalkable(tx,ty))break;
        nx=tx;ny=ty;
      }
      e.x=nx; e.y=ny;
      e.mesh.position.set(e.x*CELL,0,e.y*CELL);
      e.pullStun=true; // 引き寄せた直後のターンは攻撃してこない
      showAction('敵を引き寄せた！',1000);
      break;
    }
  }
  updateUI();
}

// オブジェクト
const objectMeshes=[];
// 下り階段のテクスチャをCanvasで生成（一度だけ作って使い回す）
let _stairsTexture=null;
// 金貨コインに貼る黒い$マークのテクスチャをCanvasで生成（一度だけ作って使い回す）
let _dollarMarkTexture=null;
function getDollarMarkTexture(){
  if(_dollarMarkTexture)return _dollarMarkTexture;
  const S=64;
  const cv=document.createElement('canvas');
  cv.width=S; cv.height=S;
  const c=cv.getContext('2d');
  c.clearRect(0,0,S,S);
  c.font='bold 58px "Courier New", monospace';
  c.textAlign='center';
  c.textBaseline='middle';
  c.fillStyle='#000000';
  c.fillText('$', S/2, S/2+2);
  const tex=new THREE.CanvasTexture(cv);
  tex.magFilter=THREE.NearestFilter;
  _dollarMarkTexture=tex;
  return tex;
}

function getStairsTexture(){
  if(_stairsTexture)return _stairsTexture;
  const S=64; // テクスチャ解像度
  const cv=document.createElement('canvas');
  cv.width=S; cv.height=S;
  const c=cv.getContext('2d');
  // 背景（黒い穴）
  c.fillStyle='#050508'; c.fillRect(0,0,S,S);
  const pad=5;
  const inner=S-pad*2;
  // 手前（左）が高く明るく、奥（右）に向かって低く暗くなる、階段の側面シルエット風の縦棒
  const bars=[
    {col:'#e8e8ec', h:0.90},
    {col:'#a8b0b8', h:0.64},
    {col:'#707880', h:0.42},
    {col:'#383c42', h:0.22},
  ];
  const gap=2;
  const barW=(inner-gap*(bars.length-1))/bars.length;
  bars.forEach((b,i)=>{
    const x=pad+i*(barW+gap);
    const h=inner*b.h;
    const y=S-pad-h;
    c.fillStyle=b.col;
    c.fillRect(x,y,barW,h);
    // 段の上端にハイライト
    c.fillStyle='rgba(255,255,255,0.3)';
    c.fillRect(x,y,barW,Math.max(1,h*0.08));
    // ドット状のノイズで質感を出す
    for(let n=0;n<16;n++){
      const nx=x+Math.random()*barW;
      const ny=y+Math.random()*h;
      c.fillStyle=Math.random()<0.5?'rgba(0,0,0,0.18)':'rgba(255,255,255,0.15)';
      c.fillRect(nx,ny,1,1);
    }
  });
  const tex=new THREE.CanvasTexture(cv);
  tex.magFilter=THREE.NearestFilter; // ドット感を残す
  tex.minFilter=THREE.LinearMipmapLinearFilter;
  _stairsTexture=tex;
  return tex;
}

// 岩壁テクスチャ（千鳥模様に並ぶ石積み風。1〜2Fの壁に使用）
let _rockWallTexture=null;
function getRockWallTexture(){
  if(_rockWallTexture)return _rockWallTexture;
  const S=64;
  const cv=document.createElement('canvas');
  cv.width=S; cv.height=S;
  const c=cv.getContext('2d');
  // 目地（背景）
  c.fillStyle='#1c140c';
  c.fillRect(0,0,S,S);
  const rows=4, cols=4;
  const rh=S/rows, rw=S/cols;
  const gap=2;
  for(let ry=0; ry<rows; ry++){
    const offset=(ry%2===0)?0:rw/2; // 1段おきに半マスずらして千鳥模様に
    for(let rx=-1; rx<=cols; rx++){
      const x=rx*rw+offset;
      const y=ry*rh;
      const g=110+Math.floor(Math.random()*40)-20; // 石ごとにランダムな濃淡
      c.fillStyle=`rgb(${g},${Math.round(g*0.82)},${Math.round(g*0.66)})`;
      c.fillRect(x+gap/2, y+gap/2, rw-gap, rh-gap);
    }
  }
  const tex=new THREE.CanvasTexture(cv);
  tex.magFilter=THREE.NearestFilter;
  tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
  _rockWallTexture=tex;
  return tex;
}

  if(_mossWallTexture)return _mossWallTexture;
  const S=64;
  const cv=document.createElement('canvas');
  cv.width=S; cv.height=S;
  const c=cv.getContext('2d');
  c.fillStyle='#141410';
  c.fillRect(0,0,S,S);
  const rows=4, cols=4;
  const rh=S/rows, rw=S/cols;
  const gap=2;
  for(let ry=0; ry<rows; ry++){
    const offset=(ry%2===0)?0:rw/2;
    for(let rx=-1; rx<=cols; rx++){
      const x=rx*rw+offset, y=ry*rh;
      const g=90+Math.floor(Math.random()*30)-15;
      c.fillStyle=`rgb(${Math.round(g*0.55)},${g},${Math.round(g*0.45)})`; // やや緑がかった石
      c.fillRect(x+gap/2, y+gap/2, rw-gap, rh-gap);
    }
  }
  // 苔の斑点
  for(let i=0;i<12;i++){
    const mx=Math.random()*S, my=Math.random()*S, mr=2+Math.random()*4;
    c.fillStyle='rgba(60,110,50,0.5)';
    c.beginPath(); c.arc(mx,my,mr,0,Math.PI*2); c.fill();
  }
  const tex=new THREE.CanvasTexture(cv);
  tex.magFilter=THREE.NearestFilter;
  tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
  _mossWallTexture=tex;
  return tex;
}

  c.fillStyle='#0a0608';
  c.fillRect(0,0,S,S);
  const rows=4, cols=4;
  const rh=S/rows, rw=S/cols;
  const gap=2;
  for(let ry=0; ry<rows; ry++){
    const offset=(ry%2===0)?0:rw/2;
    for(let rx=-1; rx<=cols; rx++){
      const x=rx*rw+offset, y=ry*rh;
      const g=28+Math.floor(Math.random()*18);
      c.fillStyle=`rgb(${g},${Math.round(g*0.6)},${Math.round(g*0.7)})`; // 黒っぽい岩石
      c.fillRect(x+gap/2, y+gap/2, rw-gap, rh-gap);
    }
  }
  // マグマの亀裂
  c.strokeStyle='rgba(255,90,20,0.8)';
  c.lineWidth=1.5;
  for(let i=0;i<5;i++){
    let x=Math.random()*S, y=Math.random()*S;
    c.beginPath(); c.moveTo(x,y);
    for(let s=0;s<4;s++){
      x+=(Math.random()-0.5)*16; y+=(Math.random()-0.5)*16;
      c.lineTo(x,y);
    }
    c.stroke();
  }
  const tex=new THREE.CanvasTexture(cv);
  tex.magFilter=THREE.NearestFilter;
  tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
  _obsidianWallTexture=tex;
  return tex;
}

// フロアの深度帯に応じた壁テクスチャを返す
function getWallTextureForFloor(floor){
  if(floor<=2) return getRockWallTexture();
  if(floor<=4) return getBrickWallTexture();
  if(floor<=6) return getMossWallTexture();
  if(floor<=8) return getCaveWallTexture();
  return getObsidianWallTexture(); // 9〜10F
}

// 石畳の床テクスチャ（1〜10F共通）
let _floorTexture=null;
function getFloorTexture(){
  if(_floorTexture)return _floorTexture;
  const S=64;
  const cv=document.createElement('canvas');
  cv.width=S; cv.height=S;
  const c=cv.getContext('2d');
  c.fillStyle='#1c1818'; // 目地
  c.fillRect(0,0,S,S);
  const rows=3, cols=3;
  const rh=S/rows, rw=S/cols;
  const gap=2;
  for(let ry=0; ry<rows; ry++){
    const offset=(ry%2===0)?0:rw/2; // 石畳特有の互い違い
    for(let rx=-1; rx<=cols; rx++){
      const x=rx*rw+offset, y=ry*rh;
      const g=40+Math.floor(Math.random()*24)-12;
      c.fillStyle=`rgb(${g},${Math.round(g*0.97)},${Math.round(g*0.97)})`; // 2倍濃いグレーの石畳
      c.fillRect(x+gap/2, y+gap/2, rw-gap, rh-gap);
    }
  }
  // マス目がわかるよう、1マス(タイル1枚)ごとの境界線を焼き込む
  c.strokeStyle='rgba(0,0,0,0.55)';
  c.lineWidth=2;
  c.strokeRect(1,1,S-2,S-2);
  const tex=new THREE.CanvasTexture(cv);
  tex.magFilter=THREE.NearestFilter;
  tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
  _floorTexture=tex;
  return tex;
}

// コンクリート風の天井テクスチャ（1〜10F共通。壁とは別の質感にする）
let _ceilingTexture=null;
function getCeilingTexture(){
  if(_ceilingTexture)return _ceilingTexture;
  const S=64;
  const cv=document.createElement('canvas');
  cv.width=S; cv.height=S;
  const c=cv.getContext('2d');
  // 打ちっぱなしコンクリートのようなムラのある灰色
  c.fillStyle='#5a5a58';
  c.fillRect(0,0,S,S);
  for(let i=0;i<90;i++){
    const x=Math.random()*S, y=Math.random()*S, r=1+Math.random()*3;
    const g=70+Math.floor(Math.random()*40)-20;
    c.fillStyle=`rgba(${g},${g},${Math.round(g*0.98)},0.5)`;
    c.beginPath(); c.arc(x,y,r,0,Math.PI*2); c.fill();
  }
  // 型枠の継ぎ目のような薄いひび割れ線
  c.strokeStyle='rgba(30,30,28,0.5)';
  c.lineWidth=1;
  for(let i=0;i<4;i++){
    let x=Math.random()*S, y=Math.random()*S;
    c.beginPath(); c.moveTo(x,y);
    for(let s=0;s<3;s++){
      x+=(Math.random()-0.5)*20; y+=(Math.random()-0.5)*20;
      c.lineTo(x,y);
    }
    c.stroke();
  }
  const tex=new THREE.CanvasTexture(cv);
  tex.magFilter=THREE.NearestFilter;
  tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
  _ceilingTexture=tex;
  return tex;
}

function spawnObject(type,gx,gy,arg){
  const wx=gx*CELL,wz=gy*CELL;let mesh;
  if(type==='stairs'){
    // 下り階段：Canvasで描いた階段の絵をテクスチャとして床に貼る
    const tex=getStairsTexture();
    const geo=new THREE.PlaneGeometry(CELL*0.95, CELL*0.95);
    const mat=new THREE.MeshBasicMaterial({map:tex, transparent:true});
    const plane=new THREE.Mesh(geo, mat);
    plane.rotation.x=-Math.PI/2;
    plane.position.set(wx, 0.06, wz);
    plane.userData={gx,gy};
    scene.add(plane);objectMeshes.push(plane);
    return;
  } else if(type==='return'){
    mesh=new THREE.Mesh(new THREE.CylinderGeometry(0.6,0.7,0.2,10),new THREE.MeshLambertMaterial({color:0x2080ff,emissive:0x102040}));
    mesh.position.set(wx,0.1,wz);
    mesh.userData={gx,gy};
    const lt=new THREE.PointLight(0x4080ff,2,4);lt.position.set(wx,1,wz);scene.add(lt);
  } else if(type==='item'){
    const key=arg||FLOOR_ITEM_KEYS[Math.floor(Math.random()*FLOOR_ITEM_KEYS.length)];
    const db=ITEM_DB[key];
    const g=new THREE.Group();
    buildItemMesh(g, db.type);
    // バウンディングボックスの中心を原点に揃える（マス目の真ん中に来るように）
    const box=new THREE.Box3().setFromObject(g);
    const center=box.getCenter(new THREE.Vector3());
    const size=box.getSize(new THREE.Vector3());
    g.children.forEach(child=>{ child.position.sub(center); });
    const itemScale=db.type==='food'?2.2*0.75:2.2;
    g.scale.set(itemScale,itemScale,itemScale);
    // 縦長の武器・盾・杖・巻物は寝かせる、薬・食べ物は立てたまま
    if(db.type==='weapon'||db.type==='shield'||db.type==='staff'||db.type==='scroll'){
      g.rotation.x=-Math.PI/2;
      // 寝かせた時、床から浮く高さ = 回転後に厚みとなるローカルZサイズの半分
      g.position.set(wx, Math.max(0.06,(size.z/2)*itemScale), wz);
    } else {
      // 立てたまま：底面が床に接するよう高さの半分だけ持ち上げる
      g.position.set(wx, (size.y/2)*itemScale, wz);
    }
    scene.add(g);
    g.userData={gx,gy};
    floorItems.push({x:gx, y:gy, mesh:g, key});
    mesh=null;
    objectMeshes.push(g);
    if(mesh){mesh.userData={type,gx,gy};scene.add(mesh);objectMeshes.push(mesh);}
    return;
  } else if(type==='entry'){
    // ダンジョン入口も、フロアの下り階段と同じ見た目にする
    const tex=getStairsTexture();
    const geo=new THREE.PlaneGeometry(CELL*0.95, CELL*0.95);
    const mat=new THREE.MeshBasicMaterial({map:tex, transparent:true});
    const plane=new THREE.Mesh(geo, mat);
    plane.rotation.x=-Math.PI/2;
    plane.position.set(wx, 0.06, wz);
    plane.userData={gx,gy};
    scene.add(plane);objectMeshes.push(plane);
    return;
  } else if(type==='gold'){
    const amount=arg||10;
    const g=new THREE.Group();
    // スーパーマリオのコインのような、金色の丸いコイン
    const COIN=0xffd700, COIN_RIM=0xfff4c0, COIN_CORE=0xe8b800;
    const coin=new THREE.Mesh(
      new THREE.CylinderGeometry(0.26,0.26,0.08,20),
      new THREE.MeshLambertMaterial({color:COIN})
    );
    coin.position.set(0,0.12,0);
    g.add(coin);
    const rim=new THREE.Mesh(
      new THREE.TorusGeometry(0.24,0.03,8,20),
      new THREE.MeshLambertMaterial({color:COIN_RIM})
    );
    rim.rotation.x=Math.PI/2;
    rim.position.set(0,0.165,0);
    g.add(rim);
    const core=new THREE.Mesh(
      new THREE.CylinderGeometry(0.15,0.15,0.02,16),
      new THREE.MeshLambertMaterial({color:COIN_CORE})
    );
    core.position.set(0,0.17,0);
    g.add(core);
    // 視認しやすいよう、コイン表面に黒い$マークを重ねて描く
    const markTex=getDollarMarkTexture();
    const mark=new THREE.Mesh(
      new THREE.PlaneGeometry(0.364,0.364),
      new THREE.MeshBasicMaterial({map:markTex, transparent:true})
    );
    mark.rotation.x=-Math.PI/2;
    mark.position.set(0,0.182,0);
    g.add(mark);
    g.scale.set(1.5,1.5,1.5);
    g.position.set(wx,0.05,wz);
    g.userData={gx,gy,isGold:true};
    scene.add(g);
    // 金色の光で存在を強調
    const glt=new THREE.PointLight(0xffd040,1.8,3.5);
    glt.position.set(wx,0.9,wz);
    scene.add(glt);
    g.userData.light=glt;
    floorItems.push({x:gx, y:gy, mesh:g, key:'gold', gold:amount, light:glt});
    objectMeshes.push(g);
    objectMeshes.push(glt);
    return;
  } else if(type==='enemy'){
    const monType=arg||'slime';
    const db=MONSTER_DB[monType];
    const g=new THREE.Group();
    db.buildMesh(g);
    g.scale.set(ENEMY_SCALE,ENEMY_SCALE,ENEMY_SCALE);
    g.position.set(wx,0,wz);
    scene.add(g);objectMeshes.push(g);
    const roomIdx=rooms.findIndex(r=>gx>=r.x&&gx<r.x+r.w&&gy>=r.y&&gy<r.y+r.h);
    enemies.push({x:gx,y:gy,hp:db.hp,maxHp:db.hp,atk:db.atk,def:db.def,exp:db.exp,
      mesh:g,aware:false,type:db.aiType,monType,roomIdx});
    return;
  }
  if(mesh){mesh.userData={type,gx,gy};scene.add(mesh);objectMeshes.push(mesh);}
}

// エントランス初期化

  rem.forEach(c=>scene.remove(c));
  wallMeshes.length=0;fadedWalls.clear();ceilingMeshes.length=0;objectMeshes.length=0;floorItems=[];enemies=[];
  npcList=[]; // NPCリストをリセット

  MAP=res.cells;rooms=res.rooms;entranceInfo=res;
  explored=Array.from({length:MAP_H},()=>Array(MAP_W).fill(true)); // エントランスは常に全体明示
  buildDungeon();

  state.x=res.startX; state.y=res.startY;
  playerGroup.position.set(state.x*CELL,0,state.y*CELL);
  camX=state.x*CELL;camZ=state.y*CELL;
  updatePlayerPos();updateExplored();

  // ダンジョン入口オブジェクト
  spawnObject('entry', res.doorX, res.doorY);

  // 入れない部屋（ショップ・銀行・スペース）の入り口をNPCで塞ぐ
  spawnBlockerNPCs(res);

  updateUI();
  saveGame();
}

// 倉庫案内NPCの生成・配置（倉庫の入口脇、通路はふさがない位置）

  vox(0.16,0.28,0.16, 0x2a2016, -0.12,0.14,0, g); // 左脚
  vox(0.16,0.28,0.16, 0x2a2016,  0.12,0.14,0, g); // 右脚
  vox(0.42,0.4,0.28, robe, 0,0.5,0, g);           // 胴（衣）
  vox(0.14,0.32,0.16, robe, -0.29,0.5,0, g);      // 左腕
  vox(0.14,0.32,0.16, robe,  0.29,0.5,0, g);       // 右腕
  vox(0.32,0.3,0.3, 0xd8b088, 0,0.86,0, g);       // 頭
  vox(0.34,0.1,0.32, 0x4a3020, 0,1.0,0, g);       // 頭巾
  vox(0.06,0.07,0.04, 0x302010, -0.08,0.86,0.16, g); // 目
  vox(0.06,0.07,0.04, 0x302010,  0.08,0.86,0.16, g); // 目

function spawnWarehouseNPC(room){
  // 倉庫は入れる部屋なので、通路をふさがない位置（部屋内の隅）に配置
  const npcX=room.x+room.w-2, npcY=room.cy-2;
  spawnNPC(npcX,npcY,'倉庫の案内人',
    'ここは倉庫じゃ。\n色の変わった床にアイテムを『置く』と、\n次に来た時もそのまま残っておるよ。\nまだ使えん床もあるが、\nそのうち広がるかもしれんのう。',
    0x6a4a28, Math.PI*0.75);
}

// 入れない部屋（ショップ・銀行・スペース）の入り口をNPCで塞ぐ
function spawnBlockerNPCs(res){
  // 各部屋と本体をつなぐ通路は部屋の cy 行。その部屋側の入り口マスに立たせて塞ぐ。
  // ショップ：左側の部屋 → 入り口は部屋の右端の外(=部屋右端+0 は部屋内なので、通路の1マス)
  // 通路は carveH で部屋の端から本体まで掘られている。部屋のすぐ外＝入り口を塞ぐ。
  const shop=res.shopRoom, bank=res.bankRoom, space=res.spaceRoom;
  const blockText='準備中だよ。';
  // ショップ（左下）：部屋の右端の1つ外に立つ（東を向く＝通路側）
  spawnNPC(shop.x+shop.w, shop.cy, 'ショップの店員', blockText, 0x2a4a6a, -Math.PI/2);
  // 銀行（右上）：部屋の左端の1つ外に立つ（西を向く）
  spawnNPC(bank.x-1, bank.cy, '銀行の番人', blockText, 0x4a6a2a, Math.PI/2);
  // スペース（右下）：部屋の左端の1つ外に立つ（西を向く）
  spawnNPC(space.x-1, space.cy, '謎の人物', blockText, 0x5a2a5a, Math.PI/2);
}

// 倉庫の5x5スペースに床マーカーを表示（解放済み/未解放）
function buildWarehouseFloor(room){
  const baseX=room.cx-2, baseY=room.cy-2; // 5x5の左上
  for(let sy=0;sy<5;sy++){
    for(let sx=0;sx<5;sx++){
      const idx=sy*5+sx;
      const gx=baseX+sx, gy=baseY+sy;
      const wx=gx*CELL, wz=gy*CELL;
      const unlocked=idx<warehouseUnlocked;
      const marker=new THREE.Mesh(
        new THREE.BoxGeometry(CELL*0.85,0.06,CELL*0.85),
        new THREE.MeshBasicMaterial({color:unlocked?0x8a6030:0x302418,transparent:true,opacity:unlocked?0.5:0.25})
      );
      marker.position.set(wx,0.03,wz);
      marker.userData={gx,gy,isWarehouseSlot:true,slotIndex:idx};
      scene.add(marker);
      objectMeshes.push(marker);
    }
  }
}

// 保存済みアイテムをワールドに再配置
function restoreWarehouseItems(room){
  const baseX=room.cx-2, baseY=room.cy-2;
  Object.keys(warehouseData).forEach(key=>{
    const it=warehouseData[key];
    if(!it)return;
    const [sx,sy]=key.split(',').map(Number);
    const gx=baseX+sx, gy=baseY+sy;
    spawnObject('item',gx,gy,it.itemKey);
    // 見た目に反映（plusやchargesは床アイテムには紐付かないため簡易表示）
  });
}


// フロア初期化
function initFloor(floor){
  state.inEntrance=false;
  state.floor=floor;
  npcList=[];
  floorTurnCount=0; updateTurnCounterDisplay(); // このフロアでのターン数をリセット
  const keep=new Set([playerGroup,playerLight,fillLight,guideLine]);
  const rem=[];scene.children.forEach(c=>{if(!keep.has(c)&&!(c instanceof THREE.AmbientLight))rem.push(c);});
  rem.forEach(c=>scene.remove(c));
  wallMeshes.length=0;fadedWalls.clear();ceilingMeshes.length=0;objectMeshes.length=0;floorItems=[];enemies=[];

  const res=generateMap(floor);MAP=res.cells;rooms=res.rooms;
  // 探索フラグ初期化（全て未探索）
  explored=Array.from({length:MAP_H},()=>Array(MAP_W).fill(false));
  buildDungeon();

  const startRoom=rooms[Math.floor(Math.random()*rooms.length)];
  const sp=rndInRoom(startRoom);state.x=sp.x;state.y=sp.y;
  playerGroup.position.set(state.x*CELL,0,state.y*CELL); // 初期位置は即セット
  camX=state.x*CELL;camZ=state.y*CELL;
  updateExplored();

  const otherRooms=rooms.filter(r=>r!==startRoom);
  const stairRoom=otherRooms[Math.floor(Math.random()*otherRooms.length)]||startRoom;
  // 10Fは最深部なので階段を置かない
  if(floor>=10){
    stairsPos=null;
  } else {
    stairsPos=rndInRoom(stairRoom);spawnObject('stairs',stairsPos.x,stairsPos.y);
  }

  returnPos=null;
  if(RETURN_FLOORS.includes(floor)){
    const rc=rooms.filter(r=>r!==startRoom&&r!==stairRoom);
    const rr=rc.length>0?rc[Math.floor(Math.random()*rc.length)]:stairRoom;
    returnPos=rndInRoom(rr);spawnObject('return',returnPos.x,returnPos.y);
  }

  rooms.forEach(room=>{
    const cnt=Math.floor(Math.random()*3);
    for(let i=0;i<cnt;i++){
      let p=null, tries=0;
      while(tries<10){
        const cand=rndInRoom(room);
        const bl=(stairsPos&&cand.x===stairsPos.x&&cand.y===stairsPos.y)||
                 (returnPos&&cand.x===returnPos.x&&cand.y===returnPos.y)||
                 floorItems.some(f=>f.x===cand.x&&f.y===cand.y);
        if(!bl){ p=cand; break; }
        tries++;
      }
      if(p) spawnObject('item',p.x,p.y);
    }
    // 金貨（各部屋50%で1個、10〜100ゴールド）
    if(Math.random()<0.5){
      let gp=null, tries2=0;
      while(tries2<10){
        const cand=rndInRoom(room);
        const occupied=floorItems.some(f=>f.x===cand.x&&f.y===cand.y)||
          (stairsPos&&cand.x===stairsPos.x&&cand.y===stairsPos.y)||
          (returnPos&&cand.x===returnPos.x&&cand.y===returnPos.y);
        if(!occupied){ gp=cand; break; }
        tries2++;
      }
      if(gp){
        const amount=10+Math.floor(Math.random()*10)*10; // 10〜100（10刻み）
        spawnObject('gold',gp.x,gp.y,amount);
      }
    }
  });

  // 階層別モンスタースポーン
  const monTypes=FLOOR_MONSTER_POOL[floor]||['slime'];

  if(floor===10){
    // 10F：ドラゴン1体のみ、部屋中央に配置
    const bossRoom=rooms[0];
    const bp=rndInRoom(bossRoom);
    spawnObject('enemy',bp.x,bp.y,'dragon');
  } else {
    // 1〜9F：7〜8体を全フロアから均等にスポーン
    const targetCount=7+Math.floor(Math.random()*2);
    let spawned=0;
    let attempts=0;
    const usedPositions=new Set();
    while(spawned<targetCount&&attempts<200){
      attempts++;
      // 全部屋からランダムに選ぶ
      const room=rooms[Math.floor(Math.random()*rooms.length)];
      const p=rndInRoom(room);
      const key=`${p.x},${p.y}`;
      const bl=(p.x===state.x&&p.y===state.y)||
               (stairsPos&&p.x===stairsPos.x&&p.y===stairsPos.y)||
               (returnPos&&p.x===returnPos.x&&p.y===returnPos.y)||
               usedPositions.has(key);
      if(!bl){
        usedPositions.add(key);
        const monType=monTypes[Math.floor(Math.random()*monTypes.length)];
        spawnObject('enemy',p.x,p.y,monType);
        spawned++;
      }
    }
  }

  // 自機が他フロアにいた間に配送予約されたモンスターを、このフロアに出現させる
  if(pendingFloorSpawns[floor]){
    const pendingCount=pendingFloorSpawns[floor];
    delete pendingFloorSpawns[floor];
    for(let i=0;i<pendingCount;i++){
      const room=rooms[Math.floor(Math.random()*rooms.length)];
      let p=null, tries=0;
      while(tries<10){
        const cand=rndInRoom(room);
        const bl=(cand.x===state.x&&cand.y===state.y)||
                 (stairsPos&&cand.x===stairsPos.x&&cand.y===stairsPos.y)||
                 (returnPos&&cand.x===returnPos.x&&cand.y===returnPos.y)||
                 enemies.some(e=>e.x===cand.x&&e.y===cand.y);
        if(!bl){ p=cand; break; }
        tries++;
      }
      if(p){
        const monType=monTypes[Math.floor(Math.random()*monTypes.length)];
        spawnObject('enemy',p.x,p.y,monType);
      }
    }
  }

  updatePlayerPos();updateCamera();updateUI();
  saveGame();
}

const SAVE_KEY='dungeon3d_save_v1';

function serializeSave(){
  const data={
    version:1,
    savedAt:Date.now(),
    state:{...state},
    playerSleepTurns,
    nextItemId,
    warehouseUnlocked,
    warehouseData,
    pendingFloorSpawns,
    inventory:inventory.map(it=>{
      const o={id:it.id,key:it.key,plus:it.plus||0,equipped:!!it.equipped};
      if(it.charges!==undefined)o.charges=it.charges;
      return o;
    }),
    floor:null
  };
  if(!state.inEntrance){
    data.floor={
      MAP, rooms, stairsPos, returnPos, explored,
      floorItems:floorItems.map(f=>({x:f.x,y:f.y,key:f.key,gold:f.gold})),
      enemies:enemies.map(e=>({
        x:e.x,y:e.y,hp:e.hp,maxHp:e.maxHp,atk:e.atk,def:e.def,exp:e.exp,
        type:e.type,monType:e.monType,roomIdx:e.roomIdx,aware:e.aware,
        sleep:e.sleep||0,confused:e.confused||0,sealed:e.sealed||0,
        poisoned:e.poisoned||0,atkDown:e.atkDown||0
      }))
    };
  }
  return data;
}

function saveGame(){
  try{
    localStorage.setItem(SAVE_KEY, JSON.stringify(serializeSave()));
    return true;
  }catch(e){
    console.error('セーブに失敗しました', e);
    return false;
  }
}

let lastAutoSaveTime=0;
function saveGameThrottled(){
  const now=performance.now();
  if(now-lastAutoSaveTime<300)return;
  lastAutoSaveTime=now;
  saveGame();
}

function hasSaveData(){

}

function loadSaveData(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);

function applySave(data){
  Object.assign(state, data.state);
  playerSleepTurns=data.playerSleepTurns||0;
  nextItemId=data.nextItemId||nextItemId;
  warehouseUnlocked=data.warehouseUnlocked!==undefined?data.warehouseUnlocked:warehouseUnlocked;
  warehouseData=data.warehouseData||{};
  pendingFloorSpawns=data.pendingFloorSpawns||{};

  inventory.length=0;
  equippedWeapon=null; equippedArmor=null;
  (data.inventory||[]).forEach(saved=>{
    const db=ITEM_DB[saved.key];
    if(!db)return;
    const it={id:saved.id, key:saved.key, plus:saved.plus||0, equipped:!!saved.equipped};
    if(saved.charges!==undefined)it.charges=saved.charges;
    inventory.push(it);
    if(it.equipped){
      if(db.type==='weapon') equippedWeapon=it;
      else if(db.type==='shield'||db.type==='armor') equippedArmor=it;
    }
  });

  if(!data.floor){
    state.inEntrance=true;
    const sx=state.x, sy=state.y;
    initEntrance(); // 内部でsaveGame()が再度走るが問題ない
    state.x=sx; state.y=sy;
    playerGroup.position.set(state.x*CELL,0,state.y*CELL);
    camX=state.x*CELL;camZ=state.y*CELL;
    updatePlayerPos();updateExplored();
  } else {
    restoreFloor(data.floor);
  }
  updateUI();
}

// 再構築するための関数（直前の行動を失わずに画面だけを復旧できる）
function rebuildCurrentScene(){
  if(state.inEntrance){
    const sx=state.x, sy=state.y;
    initEntrance();
    state.x=sx; state.y=sy;
    playerGroup.position.set(state.x*CELL,0,state.y*CELL);
    camX=state.x*CELL;camZ=state.y*CELL;
    updatePlayerPos();updateExplored();updateCamera();
  } else {
    const floorSnapshot={
      MAP, rooms, stairsPos, returnPos, explored,
      floorItems: floorItems.map(f=>({x:f.x,y:f.y,key:f.key,gold:f.gold})),
      enemies: enemies.map(e=>({
        x:e.x,y:e.y,hp:e.hp,maxHp:e.maxHp,atk:e.atk,def:e.def,exp:e.exp,
        type:e.type,monType:e.monType,roomIdx:e.roomIdx,aware:e.aware,
        sleep:e.sleep||0,confused:e.confused||0,sealed:e.sealed||0,
        poisoned:e.poisoned||0,atkDown:e.atkDown||0
      }))
    };
    restoreFloor(floorSnapshot);
  }
}

// 保存されたフロア状態をそのまま復元（ランダム生成しない）
function restoreFloor(floorData){
  state.inEntrance=false;
  npcList=[];
  floorTurnCount=0; updateTurnCounterDisplay();
  const keep=new Set([playerGroup,playerLight,fillLight,guideLine]);
  const rem=[];scene.children.forEach(c=>{if(!keep.has(c)&&!(c instanceof THREE.AmbientLight))rem.push(c);});
  rem.forEach(c=>scene.remove(c));
  wallMeshes.length=0;fadedWalls.clear();ceilingMeshes.length=0;objectMeshes.length=0;floorItems=[];enemies=[];

  MAP=floorData.MAP;
  rooms=floorData.rooms;
  explored=floorData.explored;
  stairsPos=floorData.stairsPos;
  returnPos=floorData.returnPos;

  buildDungeon();

  // カメラ・自機位置は最優先で確定させる（この後の敵/アイテム復元で
  // 何か失敗しても、画面が真っ暗にならないようにするため）
  playerGroup.position.set(state.x*CELL,0,state.y*CELL);
  camX=state.x*CELL;camZ=state.y*CELL;
  updatePlayerPos();updateExplored();updateCamera();

  try{
    if(stairsPos) spawnObject('stairs',stairsPos.x,stairsPos.y);
    if(returnPos) spawnObject('return',returnPos.x,returnPos.y);
  }catch(err){ console.error('階段/帰還ポイントの復元に失敗しました',err); }

  (floorData.floorItems||[]).forEach(f=>{
    try{
      if(f.key==='gold'){ spawnObject('gold',f.x,f.y,f.gold); }
      else if(ITEM_DB[f.key]){ spawnObject('item',f.x,f.y,f.key); }
      else { console.warn('不明なアイテムキーをスキップしました',f.key); }
    }catch(err){ console.error('床アイテムの復元に失敗しました',f,err); }
  });

  (floorData.enemies||[]).forEach(saved=>{
    try{
      if(!MONSTER_DB[saved.monType]){ console.warn('不明なモンスター種別をスキップしました',saved.monType); return; }
      spawnObject('enemy',saved.x,saved.y,saved.monType);
      const e=enemies[enemies.length-1];
      if(e){
        e.hp=saved.hp; e.maxHp=saved.maxHp; e.atk=saved.atk; e.def=saved.def; e.exp=saved.exp;
        e.aware=saved.aware; e.sleep=saved.sleep||0; e.confused=saved.confused||0;
        e.sealed=saved.sealed||0; e.poisoned=saved.poisoned||0; e.atkDown=saved.atkDown||0;
        e.roomIdx=saved.roomIdx;
      }
    }catch(err){ console.error('敵の復元に失敗しました',saved,err); }
  });
}

// カメラ
const _v=new THREE.Vector3();
let firstPersonMode=false; // 試験的な一人称視点モード（ステータスバー下のボタンで切り替え）
const FP_EYE_HEIGHT=1.3;
function updateCamera(){
  // 自機の論理座標（補間後）にカメラを追従させる（攻撃突進などの演出では動かさない）
  const px=camX, pz=camZ;
  if(firstPersonMode){
    // 一人称：自機の位置・向きに合わせてカメラ自体を配置する
    const fx=Math.cos(state.angle), fz=Math.sin(state.angle);
    camera.position.set(px, FP_EYE_HEIGHT, pz);
    camera.lookAt(px+fx, FP_EYE_HEIGHT, pz+fz);
  } else {
    camera.position.set(px, 11, pz+5.5);
    camera.lookAt(px, 0.5, pz-0.5);
  }
  // 一人称視点中は自機の姿がカメラと重なって邪魔になるため非表示にする
  playerGroup.visible=!firstPersonMode;
  // 天井は一人称視点の時だけ表示する（三人称は見下ろすアングルのため不要）
  ceilingMeshes.forEach(c=>{c.visible=firstPersonMode;});

  wallMeshes.forEach(m=>{
    if(m.material.transparent){
      m.material.transparent=false;
      m.material.opacity=1;
      m.material.needsUpdate=true;
    }
  });

  playerLight.position.set(px,1.8,pz);
  fillLight.position.set(px,2,pz);
  // 部屋なら広く明るく、通路なら狭く（2マス先まで）。エントランスは常に明るい
  const inRoom=state.inEntrance || rooms.some(r=>state.x>=r.x&&state.x<r.x+r.w&&state.y>=r.y&&state.y<r.y+r.h);
  if(inRoom){
    playerLight.distance=30; playerLight.intensity=15;
    fillLight.distance=40; fillLight.intensity=7;
    ambLight.intensity=8.5;
  } else {
    // 通路：自機の周囲が円形に明るく照らされる（画像のような光だまり）
    playerLight.distance=CELL*4.2; playerLight.intensity=20;
    fillLight.distance=CELL*4.5; fillLight.intensity=5;
    ambLight.intensity=2.6;
  }
}

// 自機と隣接（8方向1マス以内）しているモンスターの配列を返す
function getAdjacentEnemies(){
  return enemies.filter(e=>e.hp>0&&e!==undefined&&Math.abs(e.x-state.x)<=1&&Math.abs(e.y-state.y)<=1&&!(e.x===state.x&&e.y===state.y));
}
// 自機とモンスターが新たに隣接した時だけ、そのモンスターの方向へ自機の向きを変える
// （既に他のモンスターと隣接していた場合は向きを変えない）
function checkAutoFaceNewAdjacent(){
  const current=getAdjacentEnemies();
  if(prevAdjacentEnemies.length===0&&current.length>0){
    const target=current[0];
    const dx=Math.sign(target.x-state.x), dy=Math.sign(target.y-state.y);
    const dirIdx=DIR_DX.findIndex((v,i)=>v===dx&&DIR_DY[i]===dy);
    if(dirIdx>=0){
      state.dir=dirIdx;
      state.angle=state.targetAngle=ANGLE_OF[dirIdx];
      updatePlayerPos();
    }
  }
  prevAdjacentEnemies=current;
}

// 攻撃力＝基本攻撃力+基本攻撃力×(剣の強さ+ちから-8)/16の小数点以下を四捨五入した値（上限255）
function totalAtk(){
  const base=LEVEL_BASE[Math.min(state.lv,MAX_LEVEL)];
  const weaponPower=equippedWeapon?(ITEM_DB[equippedWeapon.key].atk||ITEM_DB[equippedWeapon.key].effect?.damage||0)+equippedWeapon.plus:0;
  const str=state.str||0;
  const atk=base+Math.round(base*(weaponPower+str-8)/16);
  return Math.max(0,Math.min(255,atk));
}

// ダメージ計算：攻撃力 ÷ 2^(防御力÷10) × 乱数(0.9〜1.1、約±10%)
function calcDamage(atk, def){
  const base = atk / Math.pow(2, Math.max(0,def)/10);
  const rnd = 0.9 + Math.random()*0.2;
  return Math.max(1, Math.round(base * rnd));
}

// 薬の効果をプレイヤーに適用
function applyPotionToPlayer(eff, name){
  const n=name||'薬';
  if(eff.heal){
    if(state.hp>=state.maxHp){
      state.maxHp+=2; state.hp=state.maxHp;
      showAction(`${n}を飲んだ。HPが満タンだったので最大HPが2増えた！`);
      spawnDamageNum(state.x*CELL,1.5,state.y*CELL,`+2`,'#40e060',true);
    } else {
      state.hp=Math.min(state.maxHp,state.hp+eff.heal);
      showAction(`${n}を飲んだ。HPが${eff.heal}回復した！`);
      spawnDamageNum(state.x*CELL,1.5,state.y*CELL,`${eff.heal}`,'#40e060',true);
    }
  }
  else if(eff.damage){ state.hp=Math.max(0,state.hp-eff.damage); showAction(`${n}を飲んだ。毒だ！HPが${eff.damage}減った`); spawnDamageNum(state.x*CELL,1.5,state.y*CELL,`${eff.damage}`,'#ffffff'); checkPlayerDeath(); }
  else if(eff.buff==='atk'){ state.str=(state.str||0)+1; showAction(`${n}を飲んだ。ちからが上がった！`); }
  else if(eff.buff==='maxhp'){ state.maxHp+=10; state.hp+=10; showAction(`${n}を飲んだ。最大HPが増えた！`); }
  else if(eff.status==='haste'){ state.haste=15; state._hasteToggle=false; showAction(`${n}を飲んだ。素早くなった！`); }
  else if(eff.status==='charge'){ state.charge=true; showAction(`${n}を飲んだ。力をためた！次の一撃が2倍`); }
  else if(eff.status==='invis'){ state.invis=15; showAction(`${n}を飲んだ。透明になった！`); }
  else if(eff.status==='confuse'){ state.confuse=8; showAction(`${n}を飲んだ。混乱した！`); }
  else if(eff.status==='sleep'){ showAction(`${n}を飲んだ。眠ってしまった…`); sleepPlayer(5); }
  else if(eff.cure){ state.confuse=0; showAction(`${n}を飲んだ。状態異常が治った！`); }
  else if(eff.revive){ showAction(`${n}は持っていると死んだ時に発動する`); }
  else { showAction(`${n}を飲んだが特に変化はない`); }
  // 薬は種類を問わず、効果に加えて満腹度を+5%する
  state.food=Math.min(state.maxFood,state.food+5);
  updateUI();
}

// プレイヤー睡眠（数ターン入力無効）
let playerSleepTurns=0;
function sleepPlayer(n){ playerSleepTurns=n; }

// ダッシュモード（オンの間、移動が高速になり床アイテムを拾わない）
let dashMode=false;

// プレイヤー死亡チェック（復活の薬があれば自動発動）
function checkPlayerDeath(){
  if(state.hp>0)return false;
  // 復活の薬を持っていれば消費して全回復
  const reviveIdx=inventory.findIndex(it=>ITEM_DB[it.key].effect&&ITEM_DB[it.key].effect.revive);
  if(reviveIdx>=0){
    inventory.splice(reviveIdx,1);
    state.hp=state.maxHp;
    showAction('復活の薬が発動！生き返った！',3000);
    triggerFlash('rgba(255,255,100,');
    updateUI();
    return false;
  }
  showAction('力尽きた...💀',3000);
  triggerFlash('rgba(180,0,0,');
  animLocked=true;
  isPlayerDown=true;
  // 自機がその場で倒れる演出 → 暗転 → エントランスへ
  playDeathSequence();
  return true;
}

// フロア遷移用の短い暗転演出：暗転→切り替え処理→明転
function fadeTransition(callback, floorLabel){
  const fade=document.getElementById('fade-overlay');
  const announce=document.getElementById('floor-announce');
  fade.classList.add('floor-fade');
  fade.classList.add('show');
  // 暗転しきってから階数を表示＋フロア切り替え
  setTimeout(()=>{
    callback();
    if(floorLabel){
      announce.textContent=floorLabel;
      announce.classList.add('show');
    }
  }, 450);
  // 階数を少し見せてから明転
  setTimeout(()=>{
    announce.classList.remove('show');
    fade.classList.remove('show');
    setTimeout(()=>{ fade.classList.remove('floor-fade'); }, 450);
  }, 1300);
}

// 死亡演出：その場で倒れ、画面が暗転してからエントランスへ戻る
let deathAnim=null;
function playDeathSequence(){
  deathAnim={startTime:performance.now(),duration:700};
  // 0.9秒後に暗転開始
  setTimeout(()=>{
    const fade=document.getElementById('fade-overlay');
    fade.classList.add('show');
  }, 900);
  // 暗転しきった頃（0.9s + フェード0.5s ≒ 1.4s）にエントランスへ
  setTimeout(()=>{
    gameOverToEntrance();
    // 復帰後、暗転を解除（フェードアウト）
    const fade=document.getElementById('fade-overlay');
    fade.classList.remove('show');
  }, 1500);
}

// ゲームオーバー：所持金・持ち物を全ロストし、ステータスをリセットしてエントランスへ
function gameOverToEntrance(){
  inventory.length=0;
  equippedWeapon=null; equippedArmor=null;
  state.gold=0;
  resetPlayerStatsForEntrance();
  animLocked=false;
  isPlayerDown=false;
  deathAnim=null;
  // 倒れ演出でついた回転・浮きを元に戻す
  playerGroup.rotation.x=0;

function checkStepOn(){
  // エントランス内：ダンジョン入口に乗ったら1Fへ
  if(state.inEntrance && entranceInfo && state.x===entranceInfo.doorX && state.y===entranceInfo.doorY){

      fadeTransition(()=>{ state.floor=nextFloor; initFloor(state.floor); }, `地下 ${nextFloor} 階`);
    });

  }
  if(returnPos&&state.x===returnPos.x&&state.y===returnPos.y){

      setLog('帰還');
      fadeTransition(()=>{
        resetPlayerStatsForEntrance();
        initEntrance();
      }, 'エントランス');
    });
    return;
  }
  // ダッシュモード中は床のアイテム・金貨を拾わないが、何の上に乗ったかは名前を表示する
  if(dashMode){
    const it=floorItems.find(i=>i.x===state.x&&i.y===state.y);

      if(it.key==='gold'){
        showAction(`${it.gold}💰`,900);

      }
    }
    return;
  }
  const item=floorItems.find(i=>i.x===state.x&&i.y===state.y);
  if(item){
    if(item.key==='gold'){
      // 金貨を拾う
      state.gold+=item.gold;
      showAction(`${item.gold}💰 拾った！`,1200);
      sfxItem();
      scene.remove(item.mesh);
      if(item.light)scene.remove(item.light);
      floorItems.splice(floorItems.indexOf(item),1);

      if(state.inEntrance) removeFromWarehouseAt(state.x,state.y);

// 倉庫マス座標判定（storageRoom内の5x5のどこにいるか。範囲外はnull）
function getWarehouseSlot(gx,gy){
  if(!entranceInfo)return null;
  const room=entranceInfo.storageRoom;
  const baseX=room.cx-2, baseY=room.cy-2;
  const sx=gx-baseX, sy=gy-baseY;
  if(sx<0||sx>=5||sy<0||sy>=5)return null;
  return {sx,sy,idx:sy*5+sx};
}
function removeFromWarehouseAt(gx,gy){
  const slot=getWarehouseSlot(gx,gy);
  if(slot) delete warehouseData[`${slot.sx},${slot.sy}`];
}

// ヒットエフェクト（パーティクル）
const hitParticles=[];
function spawnHitEffect(wx,wz){
  const geo=new THREE.SphereGeometry(0.08,4,4);
  for(let i=0;i<8;i++){
    const mat=new THREE.MeshBasicMaterial({color:0xffd040});
    const p=new THREE.Mesh(geo,mat);
    const angle=Math.random()*Math.PI*2;
    const spd=(0.5+Math.random()*0.5);
    p.position.set(wx,0.8+Math.random()*0.5,wz);
    p.userData.vx=Math.cos(angle)*spd;
    p.userData.vz=Math.sin(angle)*spd;
    p.userData.vy=0.5+Math.random()*0.5;
    p.userData.life=0;
    scene.add(p);
    hitParticles.push(p);
  }
}
function updateHitParticles(dt){
  for(let i=hitParticles.length-1;i>=0;i--){
    const p=hitParticles[i];
    p.userData.life+=dt;
    p.userData.vy-=dt*3;
    p.position.x+=p.userData.vx*dt;
    p.position.y+=p.userData.vy*dt;
    p.position.z+=p.userData.vz*dt;
    p.material.opacity=Math.max(0,1-p.userData.life/0.4);
    p.material.transparent=true;
    if(p.userData.life>0.4){scene.remove(p);hitParticles.splice(i,1);}
  }
}

// フローティングダメージ数値
const floatingNums=[];
// isHeal=true: 回復表示（上にふわっと浮かんで消える）。false: ダメージ表示（下に落ちて激しくバウンドして消える）
function spawnDamageNum(wx,wy,wz,text,color='#ff4040',isHeal=false){
  const vec=new THREE.Vector3(wx,wy,wz);
  vec.project(camera);
  const sx=(vec.x+1)/2*overlay.width;
  const sy=(-vec.y+1)/2*overlay.height;
  floatingNums.push({x:sx,y:sy,text,color,isHeal,startTime:performance.now(),duration:isHeal?900:1000});
}

function drawFloatingNums(){
  const now=performance.now();
  for(let i=floatingNums.length-1;i>=0;i--){
    const f=floatingNums[i];
    const t=(now-f.startTime)/f.duration;
    if(t>=1){floatingNums.splice(i,1);continue;}
    let drawY,alpha,size;
    if(f.isHeal){
      // 回復：これまで通り上にふわっと浮かんで消える
      alpha=1-t;
      drawY=f.y-t*60;
      size=Math.round(28+t*6);
    } else {
      // ダメージ：マスの中央まで素早く落ちて、そこで小刻みにバウンドしながら止まる。
      // フェードなしでバウンド終了後にパッと消える
      const fallT=Math.min(t/0.4,1);
      const fall=(1-Math.pow(1-fallT,2))*40; // マス中央付近まで素早く落下（イーズアウト）
      const bounce=Math.abs(Math.sin(t*Math.PI*10))*Math.pow(1-t,1.6)*9; // 小刻み・小振幅で減衰
      drawY=f.y+fall-bounce;
      alpha=1;
      size=Math.round(30-t*4);
    }
    octx.save();
    octx.globalAlpha=alpha;
    octx.font=`bold ${size}px 'Courier New'`;
    octx.textAlign='center';
    octx.strokeStyle='rgba(0,0,0,0.9)';
    octx.lineWidth=4;
    octx.strokeText(f.text,f.x,drawY);
    octx.fillStyle=f.color;
    octx.fillText(f.text,f.x,drawY);
    octx.restore();
  }
}

function updateAnims(dt){
  const now=performance.now();
  let hasActive=false;
  for(let i=anims.length-1;i>=0;i--){
    const a=anims[i];
    const t=Math.min((now-a.startTime)/a.duration,1);
    if(a.type==='lunge'){
      const offset=Math.sin(t*Math.PI)*a.dist;
      a.mesh.position.x=a.baseX+a.dx*offset;
      a.mesh.position.z=a.baseZ+a.dz*offset;
      hasActive=true;
    } else if(a.type==='shake'){
      const s=Math.sin(t*Math.PI*8)*(1-t)*0.15;
      a.mesh.position.x=a.baseX+s;
      a.mesh.position.z=a.baseZ+s*0.5;
      hasActive=true;
    } else if(a.type==='delay'){
      hasActive=true; // 位置は動かさず時間だけ経過（攻防の間）
    } else if(a.type==='punch'){
      // 素手のパンチ：肩を支点に腕を素早く前へ突き出して戻す
      a.mesh.rotation.x=-1.1*Math.sin(t*Math.PI);
      hasActive=true;
    } else if(a.type==='slash'){
      // 剣の斬撃：振りかぶり（後方）から前方へ振り下ろす軌道＋斜めの捻りを加える
      a.mesh.rotation.x=1.3*Math.cos(t*Math.PI);
      a.mesh.rotation.z=0.5*Math.sin(t*Math.PI);
      hasActive=true;
    }
    if(t>=1){
      if(a.type==='punch'||a.type==='slash'){
        a.mesh.rotation.x=0;
        a.mesh.rotation.z=0;
      } else {
        a.mesh.position.x=a.baseX;
        a.mesh.position.z=a.baseZ;
      }
      if(a.onEnd)a.onEnd();
      anims.splice(i,1);
    }
  }
  // カメラ振動
  if(cameraShake.active){
    const t=Math.min((performance.now()-cameraShake.startTime)/cameraShake.duration,1);
    if(t<1){
      const s=Math.sin(t*Math.PI*10)*(1-t)*0.3;
      camera.position.x+=s;
      camera.position.y+=s*0.5;
    } else {
      cameraShake.active=false;
    }
    hasActive=true;
  }
  animLocked=hasActive;
  updateHitParticles(dt);

  // 敵アニメ：気づいたら弾むように躍動
  const nowSec=performance.now()/1000;
  enemies.forEach(e=>{
    if(e.hp<=0)return;
    if(e.sleep>0){
      // 睡眠中：自機を向かず、動かず静止（頭上のzzZは別途描画）
      e.mesh.position.y=0;
      e.mesh.scale.set(ENEMY_SCALE,ENEMY_SCALE,ENEMY_SCALE);
    } else if(e.confused>0){
      // 混乱中：自機の方を向かず、直前に移動した向きのまま（向きはenemyTurn側で設定済み）
      const phase=nowSec*5+e.x*1.3+e.y*0.7;
      const jump=Math.abs(Math.sin(phase))*0.32;
      e.mesh.position.y=jump;
      const stretch=1+Math.cos(phase)*0.12;
      const squash=1-Math.cos(phase)*0.10;
      e.mesh.scale.set(ENEMY_SCALE*squash, ENEMY_SCALE*stretch, ENEMY_SCALE*squash);
    } else if(e.aware){
      // プレイヤー方向を向く
      const dx=state.x*CELL-e.mesh.position.x;
      const dz=state.y*CELL-e.mesh.position.z;
      e.mesh.rotation.y=Math.atan2(dx,dz);
      // 弾むジャンプ（|sin|で地面から跳ねる動き）
      const phase=nowSec*5+e.x*1.3+e.y*0.7;
      const jump=Math.abs(Math.sin(phase))*0.32;
      e.mesh.position.y=jump;
      // スクワッシュ＆ストレッチ（潰れと伸び）
      const stretch=1+Math.cos(phase)*0.12;
      const squash=1-Math.cos(phase)*0.10;
      e.mesh.scale.set(ENEMY_SCALE*squash, ENEMY_SCALE*stretch, ENEMY_SCALE*squash);
    } else if(e.type==='wander'){
      // 徘徊型：未発見でも歩いているので軽く揺れる
      const phase=nowSec*3+e.x*1.3+e.y*0.7;
      e.mesh.position.y=Math.abs(Math.sin(phase))*0.12;
      e.mesh.scale.set(ENEMY_SCALE,ENEMY_SCALE,ENEMY_SCALE);
    } else {
      // 未発見：静止
      e.mesh.rotation.y=0;
      e.mesh.position.y=0;
      e.mesh.scale.set(ENEMY_SCALE,ENEMY_SCALE,ENEMY_SCALE);
    }
  });
}
