name: iOS Build (Signed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      KEYCHAIN_PASSWORD: temporary-ci-keychain-password
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        working-directory: ios-app
        run: npm ci

      - name: Sync Capacitor web assets into the iOS project
        working-directory: ios-app
        run: npx cap sync ios

      - name: Import signing certificate into a temporary keychain
        working-directory: ios-app/ios/App
        run: |
          echo "$IOS_P12_BASE64" | base64 --decode > certificate.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain

          security import certificate.p12 -k build.keychain -P "$IOS_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          security list-keychains -d user -s build.keychain login.keychain
          rm -f certificate.p12
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISION_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/WanderersDungeonAppStore.mobileprovision
        env:
          IOS_PROVISION_BASE64: ${{ secrets.IOS_PROVISION_BASE64 }}

      - name: Archive the app
        working-directory: ios-app/ios/App
        run: |
          xcodebuild -project App.xcodeproj -scheme App -configuration Release \
            -archivePath "$PWD/build/App.xcarchive" \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=NHJQ6LPWVG \
            PROVISIONING_PROFILE_SPECIFIER="Wanderers Dungeon App Store" \
            archive

      - name: Export signed .ipa
        working-directory: ios-app/ios/App
        run: |
          xcodebuild -exportArchive \
            -archivePath "$PWD/build/App.xcarchive" \
            -exportPath "$PWD/build/ipa" \
            -exportOptionsPlist ../exportOptions.plist

      - name: Upload signed .ipa
        uses: actions/upload-artifact@v4
        with:
          name: WanderersDungeon-ios-signed
          path: ios-app/ios/App/build/ipa/*.ipa
